<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>薬理クイズ｜授乳婦向け薬剤</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --success-light: #dcfce7;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --warning: #d97706;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== ヘッダー ===== */
  .app-header {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .app-header h1 { font-size: 17px; font-weight: 700; }
  .app-header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .home-btn {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.45);
    color: #fff;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .home-btn:active { background: rgba(255,255,255,0.32); }
  .update-date { font-size: 11px; opacity: 0.72; white-space: nowrap; }

  /* ===== スタート画面 ===== */
  .start-wrap { padding: 20px 16px 40px; max-width: 480px; margin: 0 auto; }
  .hero-card {
    background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 24px;
    text-align: center;
  }
  .hero-card .icon { font-size: 48px; margin-bottom: 10px; }
  .hero-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .hero-card p { font-size: 14px; opacity: 0.9; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .mode-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    width: 100%;
    cursor: pointer;
    margin-bottom: 10px;
    text-align: left;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .mode-btn:active { background: #f1f5f9; }
  .mode-btn .btn-icon { font-size: 28px; flex-shrink: 0; }
  .mode-btn .btn-label { font-size: 15px; font-weight: 600; }
  .mode-btn .btn-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .mode-btn .arrow { margin-left: auto; color: var(--text-sub); font-size: 18px; }

  /* サブボタン（ランダム/順番通り） */
  .sub-btns { display: none; margin-top: 8px; margin-bottom: 4px; }
  .sub-btns.open { display: flex; gap: 8px; }
  .sub-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background 0.1s;
  }
  .sub-btn:active { opacity: 0.8; }
  .sub-btn.random { background: #eff6ff; border-color: #93c5fd; color: var(--primary); }
  .sub-btn.ordered { background: #f0fdf4; border-color: #86efac; color: var(--success); }

  /* セクションブロック */
  .section-block { margin-bottom: 10px; }
  .mode-btn.pharma-btn { border-color: #bfdbfe; }
  .mode-btn.pk-btn { border-color: #fbcfe8; }
  .mode-btn.all-btn { border-color: #d1d5db; }
  .mode-btn.perinatal-btn    { border-color: #a7f3d0; }
  .mode-btn.fetal-btn        { border-color: #fde68a; }
  .mode-btn.complication-btn { border-color: #fca5a5; }
  .mode-btn.congenital-btn   { border-color: #c4b5fd; }
  .mode-btn.research-btn     { border-color: #93c5fd; }
  .mode-btn.nutrition-btn    { border-color: #6ee7b7; }
  .mode-btn.risk-btn         { border-color: #fdba74; }
  .mode-btn.open { background: #f8fafc; }

  /* カテゴリリスト */
  .cat-list { display: none; margin-top: 16px; }
  .cat-list.open { display: block; }
  .cat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.1s;
  }
  .cat-item:active { background: #f1f5f9; }
  .cat-item .cat-count {
    background: #e0e7ff;
    color: var(--primary);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 12px;
    font-weight: 600;
  }

  /* ===== 問題画面 ===== */
  .quiz-wrap { padding: 16px 16px 80px; max-width: 480px; margin: 0 auto; }
  .progress-bar-bg {
    background: #e2e8f0;
    border-radius: 99px;
    height: 6px;
    margin-bottom: 4px;
  }
  .progress-bar-fill {
    background: var(--primary);
    height: 6px;
    border-radius: 99px;
    transition: width 0.3s;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 16px;
  }
  .category-badge {
    display: inline-block;
    background: #dbeafe;
    color: var(--primary);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    border: 1.5px solid var(--border);
    font-size: 15px;
    font-weight: 500;
    line-height: 1.7;
  }
  .choices { margin-bottom: 16px; }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    text-align: left;
    font-size: 14px;
    line-height: 1.55;
    transition: border-color 0.15s, background 0.15s;
  }
  .choice-btn:active:not(:disabled) { background: #f1f5f9; }
  .choice-btn:disabled { cursor: default; }
  .choice-label {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    background: #e0e7ff;
    color: var(--primary);
    border-radius: 50%;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .choice-btn.correct { border-color: var(--success); background: var(--success-light); }
  .choice-btn.correct .choice-label { background: var(--success); color: #fff; }
  .choice-btn.wrong { border-color: var(--danger); background: var(--danger-light); }
  .choice-btn.wrong .choice-label { background: var(--danger); color: #fff; }

  /* フィードバックバナー */
  .feedback-banner {
    display: none;
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 600;
    align-items: center;
    gap: 8px;
  }
  .feedback-banner.show { display: flex; }
  .feedback-banner.correct-fb { background: var(--success-light); color: var(--success); }
  .feedback-banner.wrong-fb { background: var(--danger-light); color: var(--danger); }

  /* 解説 */
  .explanation-card {
    display: none;
    background: #fffbeb;
    border: 1.5px solid #fde68a;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: #78350f;
  }
  .explanation-card.show { display: block; }
  .explanation-card .exp-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--warning);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* 次へボタン */
  .next-btn {
    display: none;
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .next-btn.show { display: block; }
  .next-btn:active { background: var(--primary-dark); }

  /* ===== 結果画面 ===== */
  .result-wrap { padding: 24px 16px 60px; max-width: 480px; margin: 0 auto; }
  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-score {
    font-size: 42px;
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
  }
  .result-denom { font-size: 20px; color: var(--text-sub); font-weight: 500; margin-bottom: 6px; }
  .result-pct { font-size: 18px; font-weight: 700; color: var(--text-sub); margin-bottom: 12px; }
  .result-msg { font-size: 14px; color: var(--text-sub); }
  .result-actions { display: flex; gap: 10px; flex-direction: column; }
  .result-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .result-btn.primary { background: var(--primary); color: #fff; }
  .result-btn.secondary { background: var(--card); border: 1.5px solid var(--border); color: var(--text); }
  .result-btn:active { opacity: 0.85; }

  /* 正解一覧 */
  .answer-list { margin-top: 20px; }
  .answer-item {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .answer-item .ans-q { font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .answer-item .ans-result {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .ans-badge {
    border-radius: 6px;
    padding: 1px 8px;
    font-weight: 700;
    font-size: 11px;
  }
  .ans-badge.ok { background: var(--success-light); color: var(--success); }
  .ans-badge.ng { background: var(--danger-light); color: var(--danger); }
  /* 難易度バッジ */
  .diff-badge { display:inline-block; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; margin-left:6px; }
  .diff-badge.d1 { background:#dcfce7; color:#15803d; }
  .diff-badge.d2 { background:#dbeafe; color:#1d4ed8; }
  .diff-badge.d3 { background:#fee2e2; color:#dc2626; }
  /* 難易度セクションボタン */
  .mode-btn.diff-easy-btn { border-color: #86efac; }
  .mode-btn.diff-mid-btn  { border-color: #93c5fd; }
  .mode-btn.diff-hard-btn { border-color: #fca5a5; }
  .mode-btn.clinical-btn  { border-color: #f9a8d4; }
</style>
</head>
<body>

<!-- ===== スタート画面 ===== -->
<div id="screenStart" class="screen active">
  <div class="app-header">
    <div>
      <h1>💊 薬理クイズ</h1>
      <p>妊婦・授乳婦 認定試験対策</p>
    </div>
    <div class="header-right">
      <span class="update-date">更新: 2025.05.01</span>
    </div>
  </div>
  <div class="start-wrap">
    <div class="hero-card">
      <div class="icon">🧬</div>
      <h2>薬剤師のための薬理問題集</h2>
      <p>全160問・5択・解説付き<br>9テーマで学べる認定試験対策問題集</p>
    </div>

    <div class="section-title">セクションを選択</div>

    <!-- 薬理セクション -->
    <div class="section-block">
      <button class="mode-btn pharma-btn" onclick="toggleSub('subPharma', this)" id="btnPharma">
        <span class="btn-icon">💊</span>
        <div>
          <div class="btn-label">薬理（受容体・作用機序）</div>
          <div class="btn-sub">50問 ｜ 受容体・作用点・分類を出題</div>
        </div>
        <span class="arrow" id="arrowPharma">›</span>
      </button>
      <div class="sub-btns" id="subPharma">
        <button class="sub-btn random" onclick="startQuiz('pharma', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('pharma', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 薬物動態セクション -->
    <div class="section-block">
      <button class="mode-btn pk-btn" onclick="toggleSub('subPK', this)" id="btnPK">
        <span class="btn-icon">🤰</span>
        <div>
          <div class="btn-label">薬物動態（妊婦・授乳婦）</div>
          <div class="btn-sub">25問 ｜ 胎盤通過・母乳移行・PK変化</div>
        </div>
        <span class="arrow" id="arrowPK">›</span>
      </button>
      <div class="sub-btns" id="subPK">
        <button class="sub-btn random" onclick="startQuiz('pk', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('pk', false)">📋 順番通り</button>
      </div>
    </div>


    <!-- 周産期医療・生理学セクション -->
    <div class="section-block">
      <button class="mode-btn perinatal-btn" onclick="toggleSub('subPerinatal', this)" id="btnPerinatal">
        <span class="btn-icon">🏥</span>
        <div>
          <div class="btn-label">周産期医療・生理学</div>
          <div class="btn-sub">10問 ｜ 妊娠・分娩・産褥の生理・ホルモン</div>
        </div>
        <span class="arrow" id="arrowPerinatal">›</span>
      </button>
      <div class="sub-btns" id="subPerinatal">
        <button class="sub-btn random" onclick="startQuiz('perinatal', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('perinatal', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 胎児・新生児セクション -->
    <div class="section-block">
      <button class="mode-btn fetal-btn" onclick="toggleSub('subFetal', this)" id="btnFetal">
        <span class="btn-icon">👶</span>
        <div>
          <div class="btn-label">胎児・新生児</div>
          <div class="btn-sub">8問 ｜ 器官形成・発育・新生児の生理・代謝</div>
        </div>
        <span class="arrow" id="arrowFetal">›</span>
      </button>
      <div class="sub-btns" id="subFetal">
        <button class="sub-btn random" onclick="startQuiz('fetal', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('fetal', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 合併疾患セクション -->
    <div class="section-block">
      <button class="mode-btn complication-btn" onclick="toggleSub('subComplication', this)" id="btnComplication">
        <span class="btn-icon">🩺</span>
        <div>
          <div class="btn-label">合併疾患</div>
          <div class="btn-sub">10問 ｜ 高血圧・糖尿病・てんかん・喘息等</div>
        </div>
        <span class="arrow" id="arrowComplication">›</span>
      </button>
      <div class="sub-btns" id="subComplication">
        <button class="sub-btn random" onclick="startQuiz('complication', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('complication', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 先天奇形・先天異常セクション -->
    <div class="section-block">
      <button class="mode-btn congenital-btn" onclick="toggleSub('subCongenital', this)" id="btnCongenital">
        <span class="btn-icon">🧬</span>
        <div>
          <div class="btn-label">先天奇形・先天異常</div>
          <div class="btn-sub">8問 ｜ 疫学・催奇形物質・リスク評価</div>
        </div>
        <span class="arrow" id="arrowCongenital">›</span>
      </button>
      <div class="sub-btns" id="subCongenital">
        <button class="sub-btn random" onclick="startQuiz('congenital', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('congenital', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 臨床研究・非臨床試験セクション -->
    <div class="section-block">
      <button class="mode-btn research-btn" onclick="toggleSub('subResearch', this)" id="btnResearch">
        <span class="btn-icon">📊</span>
        <div>
          <div class="btn-label">臨床研究・非臨床試験</div>
          <div class="btn-sub">7問 ｜ 疫学研究・生殖発生毒性試験</div>
        </div>
        <span class="arrow" id="arrowResearch">›</span>
      </button>
      <div class="sub-btns" id="subResearch">
        <button class="sub-btn random" onclick="startQuiz('research', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('research', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 栄養・嗜好品セクション -->
    <div class="section-block">
      <button class="mode-btn nutrition-btn" onclick="toggleSub('subNutrition', this)" id="btnNutrition">
        <span class="btn-icon">🥗</span>
        <div>
          <div class="btn-label">栄養・嗜好品</div>
          <div class="btn-sub">7問 ｜ 葉酸・鉄・アルコール・たばこ</div>
        </div>
        <span class="arrow" id="arrowNutrition">›</span>
      </button>
      <div class="sub-btns" id="subNutrition">
        <button class="sub-btn random" onclick="startQuiz('nutrition', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('nutrition', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- リスク評価・コミュニケーションセクション -->
    <div class="section-block">
      <button class="mode-btn risk-btn" onclick="toggleSub('subRisk', this)" id="btnRisk">
        <span class="btn-icon">⚖️</span>
        <div>
          <div class="btn-label">リスク評価・コミュニケーション</div>
          <div class="btn-sub">5問 ｜ リスクベネフィット評価・情報提供</div>
        </div>
        <span class="arrow" id="arrowRisk">›</span>
      </button>
      <div class="sub-btns" id="subRisk">
        <button class="sub-btn random" onclick="startQuiz('risk', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('risk', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 全問セクション -->
    <div class="section-block">
      <button class="mode-btn all-btn" onclick="toggleSub('subAll', this)" id="btnAll">
        <span class="btn-icon">📚</span>
        <div>
          <div class="btn-label">全問</div>
          <div class="btn-sub">160問すべてを出題</div>
        </div>
        <span class="arrow" id="arrowAll">›</span>
      </button>
      <div class="sub-btns" id="subAll">
        <button class="sub-btn random" onclick="startQuiz('all', true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuiz('all', false)">📋 順番通り</button>
      </div>
    </div>

    <!-- 難易度別 -->
    <div class="section-title" style="margin-top:16px;">難易度・出題スタイル</div>
    <div class="section-block">
      <button class="mode-btn diff-easy-btn" onclick="toggleSub('subDiffEasy', this)" id="btnDiffEasy">
        <span class="btn-icon">⭐</span>
        <div>
          <div class="btn-label">基礎レベル</div>
          <div class="btn-sub">★ 基本知識・単純想起を中心に出題</div>
        </div>
        <span class="arrow" id="arrowDiffEasy">›</span>
      </button>
      <div class="sub-btns" id="subDiffEasy">
        <button class="sub-btn random" onclick="startQuizByDifficulty(1, true)">🎲 ランダム</button>
        <button class="sub-btn ordered" onclick="startQuizByDifficulty(1, false)">📋 順番通り</button>
      </div>
    </div>
    <div class="section-block">
      <button class="mode-btn diff-mid-btn" onclick="toggleSub('subDiffMid', this)" id="btnDiffMid">
        <span class="btn-icon">⭐⭐</span>
        <div>

<script>
const quizData = [
  {id:1,difficulty:1,category:"解熱・鎮痛薬",question:"アセトアミノフェンの主な作用機序として最も適切なものはどれか。",choices:{A:"末梢のCOX-1を選択的に阻害する",B:"末梢のCOX-2を選択的に阻害する",C:"中枢のCOX-3（COX-1スプライスバリアント）を阻害する",D:"μオピオイド受容体を刺激する",E:"ロイコトリエン受容体を遮断する"},answer:"C",explanation:"アセトアミノフェンは主に中枢でのCOX-3阻害によって解熱・鎮痛効果を発揮する。末梢でのプロスタグランジン産生阻害作用は弱いため、抗炎症作用はほとんどなく、胃粘膜障害も少ない。"},
  {id:2,difficulty:1,category:"解熱・鎮痛薬",question:"セレコキシブの特徴として正しいものはどれか。",choices:{A:"COX-1を選択的に阻害し、抗血小板作用が強い",B:"COX-2を選択的に阻害し、胃粘膜障害が少ない",C:"COX-1・COX-2の両方を均等に阻害する",D:"アラキドン酸の産生を阻害する",E:"ロイコトリエンの合成を阻害する"},answer:"B",explanation:"セレコキシブはCOX-2選択的阻害薬。COX-1を介した胃粘膜保護（PGE2産生）を温存するため、従来のNSAIDsに比べて消化管障害が少ない。ただし心血管リスクへの注意が必要。"},
  {id:3,difficulty:1,category:"解熱・鎮痛薬",question:"イブプロフェン、ジクロフェナク、ロキソプロフェンに共通する作用機序はどれか。",choices:{A:"COX-1・COX-2の両方を非選択的に阻害してプロスタグランジン合成を抑制する",B:"ホスホリパーゼA2を阻害してアラキドン酸の遊離を抑制する",C:"トロンボキサンA2受容体を遮断する",D:"ブラジキニンB2受容体を遮断する",E:"5-リポキシゲナーゼを阻害する"},answer:"A",explanation:"これらは非ステロイド性抗炎症薬（NSAIDs）でありCOX-1・COX-2を非選択的に阻害する。アラキドン酸からプロスタグランジン・トロンボキサン産生を抑制することで解熱・鎮痛・抗炎症効果を発揮する。"},
  {id:4,difficulty:1,category:"解熱・鎮痛薬",question:"インドメタシンを分娩前に使用する際、特に注意すべき胎児への副作用はどれか。",choices:{A:"動脈管早期閉鎖",B:"二分脊椎",C:"心室中隔欠損",D:"口蓋裂",E:"四肢形成不全"},answer:"A",explanation:"インドメタシン（NSAIDs）はプロスタグランジン合成を阻害するため、胎児の動脈管開存に必要なPGE2を減少させ動脈管の早期閉鎖を引き起こすことがある。妊娠32週以降の使用は特に注意が必要。"},
  {id:5,difficulty:2,category:"降圧薬（Ca拮抗薬）",question:"アムロジピン・ニフェジピンの主な作用機序はどれか。",choices:{A:"L型電位依存性Caチャネルを遮断し、血管平滑筋を弛緩させる",B:"β1受容体を遮断して心拍出量を減少させる",C:"AT1受容体を遮断してアンジオテンシンIIの作用を抑制する",D:"ACEを阻害してアンジオテンシンIIの産生を抑制する",E:"α1受容体を遮断して末梢血管抵抗を低下させる"},answer:"A",explanation:"ジヒドロピリジン系Ca拮抗薬（アムロジピン・ニフェジピン）は血管平滑筋のL型Ca²⁺チャネルに選択性が高く、末梢血管拡張による降圧が主作用。心臓への作用は弱い。ニカルジピンも同系統。"},
  {id:6,difficulty:2,category:"降圧薬（Ca拮抗薬）",question:"ジルチアゼムがニフェジピンと異なる点はどれか。",choices:{A:"L型CaチャネルのみでなくT型Caチャネルも強く阻害する",B:"心臓（洞結節・房室結節）にも抑制作用を示し、頻脈を起こしにくい",C:"血管よりも心臓に選択性が高く、血圧低下作用は弱い",D:"COX-2阻害作用を併せ持つ",E:"腎臓でのNa再吸収を抑制する"},answer:"B",explanation:"ジルチアゼムはベンゾチアゼピン系Ca拮抗薬で、血管と心臓の両方に作用する。洞結節・房室結節のCaチャネルも阻害するため心拍数を低下させ、反射性頻脈が起こりにくい。これはジヒドロピリジン系との大きな違い。"},
  {id:7,difficulty:2,category:"降圧薬（ACE阻害薬）",question:"エナラプリル・カプトプリルの作用機序として正しいものはどれか。",choices:{A:"アンジオテンシンI→IIへの変換を触媒するACEを阻害する",B:"アンジオテンシンII受容体（AT1）を遮断する",C:"アルドステロンと競合してミネラルコルチコイド受容体を遮断する",D:"レニンの分泌を直接抑制する",E:"β1受容体を遮断してレニン分泌を減少させる"},answer:"A",explanation:"ACE阻害薬はアンジオテンシン変換酵素（ACE）を阻害し、アンジオテンシンIIの産生を抑制する。同時にブラジキニンの分解も抑制するため（ACEはキニナーゼII）空咳の副作用が生じる。"},
  {id:8,difficulty:2,category:"降圧薬（ARB）",question:"カンデサルタンの作用点はどれか。",choices:{A:"ACE（アンジオテンシン変換酵素）",B:"AT1受容体（アンジオテンシンII 1型受容体）",C:"AT2受容体（アンジオテンシンII 2型受容体）",D:"アルドステロン受容体",E:"レニン"},answer:"B",explanation:"ARB（アンジオテンシンII受容体拮抗薬）はAT1受容体を選択的に遮断する。ACE阻害薬とは異なりブラジキニン代謝には影響しないため空咳の副作用が少ない。AT2受容体は遮断しない（AT2刺激は臓器保護的）。"},
  {id:9,difficulty:2,category:"降圧薬（β遮断薬）",question:"プロプラノロールとビソプロロールの違いとして正しいものはどれか。",choices:{A:"プロプラノロールはβ1選択性が高く、ビソプロロールは非選択的である",B:"ビソプロロールはβ1選択性が高く、プロプラノロールはβ1・β2の両方を遮断する",C:"両者ともβ1選択性が高い",D:"プロプラノロールはα1も遮断するため起立性低血圧を起こしやすい",E:"ビソプロロールはISA（内因性交感神経刺激活性）を持つ"},answer:"B",explanation:"プロプラノロールは非選択的β遮断薬（β1・β2遮断）。β2遮断により気管支収縮が生じるため喘息患者には禁忌。ビソプロロールはβ1選択的β遮断薬で気管支への影響が少ない。ラベタロールはα1+β遮断の複合型。"},
  {id:10,difficulty:2,category:"降圧薬（その他）",question:"ラベタロールは複数の受容体に作用する。正しい組み合わせはどれか。",choices:{A:"α1受容体遮断＋β1受容体遮断",B:"α1受容体遮断＋β1・β2受容体遮断",C:"α1・α2受容体遮断＋β1受容体遮断",D:"α2受容体遮断＋β1受容体遮断",E:"α1受容体刺激＋β1受容体遮断"},answer:"B",explanation:"ラベタロールはα1受容体＋β1・β2受容体をすべて遮断する複合型遮断薬。α1遮断による末梢血管拡張とβ遮断による心拍出量減少の両方で降圧する。妊娠高血圧症候群にも使用される。"},
  {id:11,difficulty:2,category:"利尿薬",question:"スピロノラクトンの作用機序として正しいものはどれか。",choices:{A:"遠位尿細管のNa/K/2Cl共輸送体を阻害する",B:"近位尿細管の炭酸脱水素酵素を阻害する",C:"集合管でアルドステロン受容体（ミネラルコルチコイド受容体）と競合的に拮抗する",D:"集合管のADH（バソプレシン）受容体を遮断する",E:"糸球体でのナトリウム再吸収を直接抑制する"},answer:"C",explanation:"スピロノラクトンはアルドステロン拮抗薬（カリウム保持性利尿薬）。集合管でアルドステロン（ミネラルコルチコイド）受容体と競合してNa再吸収を抑制し、K排泄を減少させる。高カリウム血症に注意。"},
  {id:12,difficulty:2,category:"利尿薬",question:"アセタゾラミドの作用機序はどれか。",choices:{A:"ヘンレ係蹄上行脚のNa-K-2Cl共輸送体を阻害",B:"近位尿細管の炭酸脱水素酵素（CA）を阻害しNaHCO3の再吸収を抑制",C:"集合管のアルドステロン受容体を遮断",D:"遠位尿細管のNaCl共輸送体を阻害",E:"糸球体濾過率を直接増加させる"},answer:"B",explanation:"アセタゾラミドは炭酸脱水素酵素阻害薬。近位尿細管でH⁺産生が減少し、NaHCO3の再吸収が抑制される。代謝性アシドーシスを引き起こすことがある。緑内障（眼内圧低下）、高山病予防にも使用。"},
  {id:13,difficulty:3,category:"強心薬・抗不整脈薬",question:"ジゴキシンの主な作用機序はどれか。",choices:{A:"β1受容体を刺激してcAMPを増加させる",B:"心筋細胞膜のNa⁺/K⁺-ATPase（Naポンプ）を阻害する",C:"L型CaチャネルのCa²⁺流入を増加させる",D:"K⁺チャネルを遮断して活動電位を延長する",E:"PDE（ホスホジエステラーゼ）III阻害によりcAMPを増加させる"},answer:"B",explanation:"ジゴキシンはNa⁺/K⁺-ATPaseを阻害し、細胞内Na⁺増加→Na⁺/Ca²⁺交換輸送体（NCX）の逆方向活性化→細胞内Ca²⁺増加→心筋収縮力増強（陽性変力作用）を示す。また迷走神経刺激を介して房室伝導を抑制（陰性変時・変伝導作用）。"},
  {id:14,difficulty:3,category:"抗不整脈薬",question:"フレカイニドの主な作用機序と分類はどれか。",choices:{A:"Kチャネル遮断（クラスIII）",B:"Naチャネル遮断（クラスIC）",C:"β受容体遮断（クラスII）",D:"Caチャネル遮断（クラスIV）",E:"洞結節自動能の抑制（クラスV）"},answer:"B",explanation:"フレカイニドはVaughan Williams分類クラスICのNaチャネル遮断薬。活動電位の立ち上がり（phase 0）を遅延させ、伝導速度を低下させる。上室性・心室性不整脈に使用。"},
  {id:15,difficulty:3,category:"抗不整脈薬",question:"ベラパミルの作用と、プロプラノロールとの比較として正しいものはどれか。",choices:{A:"ベラパミルはNaチャネル遮断、プロプラノロールはKチャネル遮断",B:"ベラパミルはL型CaチャネルをCaチャネル遮断（クラスIV）、プロプラノロールはβ受容体遮断（クラスII）",C:"両者ともKチャネルを遮断して活動電位を延長する",D:"ベラパミルは洞結節に作用せずプロプラノロールのみ洞結節を抑制する",E:"両者の作用機序は同一で効力の差のみある"},answer:"B",explanation:"ベラパミルはクラスIVのCaチャネル遮断薬で、洞結節・房室結節のCa依存性活動電位を抑制する。プロプラノロールはクラスIIのβ遮断薬。両者は房室結節抑制作用があるため、併用は危険（高度徐脈・房室ブロック）。"},
  {id:16,difficulty:2,category:"抗凝固薬",question:"ワルファリンの作用機序として正しいものはどれか。",choices:{A:"トロンビンを直接阻害する",B:"活性化第X因子（FXa）を直接阻害する",C:"ビタミンKエポキシド還元酵素を阻害し、ビタミンK依存性凝固因子（II、VII、IX、X因子）の合成を阻害する",D:"アンチトロンビンIIIを活性化してトロンビンを不活化する",E:"血小板のADP受容体（P2Y12）を遮断する"},answer:"C",explanation:"ワルファリンはビタミンKエポキシド還元酵素（VKOR）を阻害し、ビタミンKの再生を阻害する。その結果、ビタミンK依存性凝固因子（II・VII・IX・X因子、プロテインC・S）の活性型γカルボキシル化が阻害され、凝固能が低下する。"},
  {id:17,difficulty:2,category:"抗凝固薬",question:"ダルテパリン（低分子ヘパリン）の作用機序はどれか。",choices:{A:"ビタミンK拮抗によって凝固因子合成を阻害する",B:"アンチトロンビンIII（AT-III）と結合してXa因子およびIIa因子（トロンビン）を不活化する（Xa阻害優位）",C:"トロンビンのフィブリノーゲン結合部位を直接遮断する",D:"血小板のGPIIb/IIIa受容体を遮断する",E:"プラスミノーゲンを活性化してフィブリンを溶解する"},answer:"B",explanation:"低分子ヘパリン（LMWH）はAT-IIIに結合してXa因子を主に阻害（Xa:IIa阻害比＝約2:1〜4:1）。未分画ヘパリンと比べてXa阻害優位で皮下注射可能、半減期が長い。プロタミンによる中和はXa阻害には部分的。"},
  {id:18,difficulty:1,category:"消化器系薬（PPI）",question:"オメプラゾール・エソメプラゾールの作用機序として正しいものはどれか。",choices:{A:"胃壁細胞のH2受容体を遮断してヒスタミン刺激を遮断する",B:"胃壁細胞のH⁺/K⁺-ATPase（プロトンポンプ）を不可逆的に阻害して胃酸分泌を抑制する",C:"ムスカリンM1受容体を遮断してアセチルコリン刺激を遮断する",D:"ガストリン受容体を遮断して胃酸分泌を抑制する",E:"ソマトスタチン受容体を刺激して胃酸分泌を抑制する"},answer:"B",explanation:"PPI（プロトンポンプ阻害薬）は酸性環境でスルフェンアミドに変換され、胃壁細胞のH⁺/K⁺-ATPaseのSH基と共有結合して不可逆的に阻害する。H2遮断薬より強力で持続的な胃酸分泌抑制効果を示す。"},
  {id:19,difficulty:1,category:"消化器系薬（H2受容体拮抗薬）",question:"ファモチジン・シメチジンの作用はどれか。",choices:{A:"プロトンポンプ（H⁺/K⁺-ATPase）を直接阻害する",B:"胃壁細胞のH2受容体を競合的に遮断してヒスタミンによる胃酸分泌を抑制する",C:"ムスカリン受容体を遮断する",D:"ガストリン受容体を遮断する",E:"プロスタグランジンE2受容体を刺激して胃粘膜を保護する"},answer:"B",explanation:"H2受容体拮抗薬は胃壁細胞のH2受容体（Gs共役型）をブロックし、ヒスタミン→アデニルシクラーゼ→cAMP→プロテインキナーゼA→H⁺/K⁺-ATPase活性化の経路を遮断する。シメチジンはCYP阻害（CYP1A2、2C9、3A4等）に注意。"},
  {id:20,difficulty:1,category:"消化器系薬（腸管運動）",question:"メトクロプラミド・ドンペリドンの制吐作用の主な機序はどれか。",choices:{A:"5-HT3受容体を遮断して中枢性嘔吐を抑制する",B:"D2受容体（ドパミンD2受容体）を遮断して化学受容器誘発帯（CTZ）への刺激を抑制する",C:"H1受容体を遮断して前庭からの刺激を抑制する",D:"ムスカリンM1受容体を遮断する",E:"オピオイドμ受容体を遮断する"},answer:"B",explanation:"メトクロプラミドとドンペリドンはD2受容体拮抗薬。CTZ（化学受容器誘発帯）はD2受容体が豊富で、ここを遮断することで制吐・胃排出促進（上部消化管の蠕動促進）効果を示す。メトクロプラミドは血液脳関門を通過するため錐体外路症状のリスクがある。"},
  {id:21,difficulty:1,category:"抗ヒスタミン薬",question:"セチリジン・フェキソフェナジン・ロラタジンが第1世代抗ヒスタミン薬（ジフェンヒドラミン等）と異なる点はどれか。",choices:{A:"H1受容体に作用せずロイコトリエン受容体を遮断する",B:"血液脳関門を通過しにくく中枢性の眠気が少ない（第2世代）",C:"抗ムスカリン作用が強く口渇・尿閉を起こしやすい",D:"H2受容体にも作用して胃酸分泌を抑制する",E:"ケミカルメディエーター遊離を抑制する作用のみを持つ"},answer:"B",explanation:"第2世代抗ヒスタミン薬（セチリジン・フェキソフェナジン・ロラタジン・デスロラタジン・レボセチリジン）は脂溶性が低く血液脳関門を透過しにくいため、中枢抑制（眠気）が少ない。抗ムスカリン作用も弱い。"},
  {id:22,difficulty:1,category:"抗アレルギー薬",question:"モンテルカストの作用機序はどれか。",choices:{A:"肥満細胞からのヒスタミン遊離を抑制する",B:"H1受容体を遮断してアレルギー症状を抑制する",C:"システイニルロイコトリエン受容体（CysLT1受容体）を遮断する",D:"IgEのFcεRI受容体への結合を阻害する",E:"5-リポキシゲナーゼを阻害してロイコトリエン産生を抑制する"},answer:"C",explanation:"モンテルカストはCysLT1（システイニルロイコトリエン1型）受容体拮抗薬。気管支喘息・アレルギー性鼻炎に使用。ロイコトリエン（LTC4・LTD4・LTE4）による気管支収縮・粘液分泌を抑制する。"},
  {id:23,difficulty:3,category:"免疫抑制薬",question:"シクロスポリン・タクロリムスに共通する作用機序はどれか。",choices:{A:"プリン合成を阻害してリンパ球増殖を抑制する",B:"カルシニューリン（ホスファターゼ）を阻害してIL-2産生を抑制する",C:"mTORを阻害してT細胞活性化を抑制する",D:"TNF-αと直接結合して中和する",E:"DNA二重鎖を架橋してDNA複製を阻害する"},answer:"B",explanation:"シクロスポリン・タクロリムスはともにカルシニューリン阻害薬。シクロスポリンはシクロフィリン、タクロリムスはFKBP12と結合した複合体がカルシニューリン（ホスファターゼ）を阻害し、NFAT（活性化T細胞核因子）の核内移行を阻止→IL-2産生抑制→T細胞活性化抑制。"},
  {id:24,difficulty:3,category:"免疫抑制薬",question:"アザチオプリンの作用機序はどれか。",choices:{A:"カルシニューリンを阻害してIL-2産生を抑制する",B:"体内で6-メルカプトプリン（6-MP）に変換され、プリン合成を阻害してDNA合成・リンパ球増殖を抑制する",C:"mTOR阻害によりT細胞の増殖シグナルを遮断する",D:"葉酸代謝を阻害してDNA合成を抑制する",E:"TNF-αに対するモノクローナル抗体として機能する"},answer:"B",explanation:"アザチオプリンは体内で6-MPに変換され、ヌクレオシドとしてプリン合成経路に取り込まれてDNA合成を阻害する。増殖の活発なリンパ球に強く作用。骨髄抑制（白血球減少）に注意。TPMT酵素の活性が低い患者では毒性が増強。"},
  {id:25,difficulty:3,category:"生物学的製剤（抗リウマチ薬）",question:"アダリムマブ・インフリキシマブ・ゴリムマブに共通する作用はどれか。",choices:{A:"IL-6受容体を遮断する",B:"TNF-α（腫瘍壊死因子α）を中和する",C:"B細胞のCD20抗原に結合してB細胞を除去する",D:"T細胞の共刺激シグナル（CD80/86-CD28）を阻害する",E:"JAK（ヤヌスキナーゼ）を阻害してサイトカインシグナルを遮断する"},answer:"B",explanation:"アダリムマブ・インフリキシマブ・ゴリムマブ・セルトリズマブペゴルはすべてTNF-α阻害薬（抗TNF製剤）。可溶型・膜型TNF-αに結合して中和し、関節破壊に関わる炎症カスケードを抑制。結核の再活性化リスクに注意（投与前にTBスクリーニングが必須）。"},
  {id:26,difficulty:3,category:"生物学的製剤（抗リウマチ薬）",question:"トシリズマブの作用機序として正しいものはどれか。",choices:{A:"TNF-αを直接中和する",B:"IL-6受容体（IL-6R）を遮断してIL-6シグナルを阻害する",C:"B細胞を選択的に除去する",D:"T細胞共刺激を阻害する",E:"インターロイキン-1受容体を遮断する"},answer:"B",explanation:"トシリズマブはヒト化抗IL-6受容体モノクローナル抗体。可溶型・膜型のIL-6受容体に結合してIL-6シグナル伝達を阻害する。RAの炎症・関節破壊に深く関わるIL-6経路を選択的にブロック。CRP低下が顕著。"},
  {id:27,difficulty:2,category:"抗菌薬（βラクタム系）",question:"アモキシシリン・アンピシリン・ベンジルペニシリン・セファロスポリン系に共通する作用機序はどれか。",choices:{A:"細菌のDNAジャイレース（トポイソメラーゼII）を阻害する",B:"細菌のリボソーム50Sサブユニットに結合してタンパク質合成を阻害する",C:"ペニシリン結合タンパク（PBP）に結合して細胞壁ペプチドグリカン合成（架橋形成）を阻害する",D:"細菌の細胞膜を障害して内容物を漏出させる",E:"葉酸合成酵素を阻害して核酸合成を抑制する"},answer:"C",explanation:"βラクタム系抗菌薬（ペニシリン・セファロスポリン・カルバペネム系）はすべてPBP（ペニシリン結合タンパク質、トランスペプチダーゼ）に不可逆的に結合し、細胞壁ペプチドグリカンの架橋形成を阻害する。MRSAはPBP2a（mecA遺伝子産物）を産生してβラクタムへの親和性が低下するため耐性。"},
  {id:28,difficulty:3,category:"抗菌薬（グリコペプチド系）",question:"バンコマイシンの作用機序はどれか。",choices:{A:"PBPに結合してペプチドグリカン架橋を阻害する",B:"ペプチドグリカン前駆体のD-Ala-D-Ala末端に結合してトランスグリコシラーゼ・トランスペプチダーゼ反応を阻害する",C:"50Sリボソームサブユニットに結合する",D:"DNAジャイレースを阻害する",E:"細胞膜に挿入されてイオンチャネルを形成する"},answer:"B",explanation:"バンコマイシン（グリコペプチド系）はペプチドグリカン前駆体のD-Ala-D-Ala配列に結合し、細胞壁合成に必要なトランスグリコシラーゼおよびトランスペプチダーゼ反応を立体障害で阻害する。MRSA・VREに対して使用されるが、VRE（バンコマイシン耐性腸球菌）はD-Ala-D-Lacに変化して耐性化。"},
  {id:29,difficulty:2,category:"抗菌薬（マクロライド系）",question:"エリスロマイシン・クラリスロマイシン・アジスロマイシン・ロキシスロマイシンの作用機序はどれか。",choices:{A:"細菌の30Sリボソームサブユニットに結合してタンパク質合成を阻害する",B:"細菌の50Sリボソームサブユニットに結合してmRNAの転移（トランスロケーション）を阻害する",C:"DNAジャイレース（トポイソメラーゼII）を阻害する",D:"細菌のRNAポリメラーゼを阻害する",E:"葉酸合成を阻害する"},answer:"B",explanation:"マクロライド系抗菌薬は細菌の50Sリボソームサブユニットの23S rRNAに結合し、ペプチジルtRNAのトランスロケーション（P部位→E部位移動）を阻害してタンパク質合成を停止させる。非典型病原体（マイコプラズマ・クラミジア・レジオネラ）に有効。"},
  {id:30,difficulty:2,category:"抗菌薬（キノロン系）",question:"シプロフロキサシン・レボフロキサシン・ノルフロキサシン・オフロキサシンの作用機序はどれか。",choices:{A:"30Sリボソームサブユニットに結合してタンパク質合成を阻害する",B:"DNAジャイレース（トポイソメラーゼII）とトポイソメラーゼIVを阻害してDNA複製を阻害する",C:"RNAポリメラーゼを阻害する",D:"細胞壁ペプチドグリカン合成を阻害する",E:"葉酸合成を阻害する"},answer:"B",explanation:"フルオロキノロン系はDNAジャイレース（グラム陰性菌で主標的）およびトポイソメラーゼIV（グラム陽性菌で主標的）を阻害し、DNA超らせん構造の制御を障害してDNA複製・転写・修復を阻止する。"},
  {id:31,difficulty:3,category:"抗菌薬（抗結核薬）",question:"イソニアジドの作用機序として正しいものはどれか。",choices:{A:"DNAジャイレースを阻害する",B:"50Sリボソームサブユニットを阻害する",C:"ミコール酸（mycolic acid）合成を阻害して結核菌の細胞壁合成を障害する",D:"RNAポリメラーゼを阻害する",E:"アラビノガラクタン合成を阻害する"},answer:"C",explanation:"イソニアジドはInhAおよびKatGを介してミコール酸合成を阻害し、結核菌特有の細胞壁成分を障害する。副作用として末梢神経障害（ビタミンB6欠乏）があり、ピリドキシン（B6）併用で予防する。リファンピシンはRNAポリメラーゼ（β-サブユニット）阻害、エタンブトールはアラビノシルトランスフェラーゼ阻害。"},
  {id:32,difficulty:2,category:"抗菌薬（クリンダマイシン）",question:"クリンダマイシンの作用機序と主な適応菌種として正しいものはどれか。",choices:{A:"DNAジャイレース阻害、グラム陰性菌に有効",B:"50Sリボソームサブユニット阻害（23S rRNAのペプチジルトランスフェラーゼ部位）、嫌気性菌・グラム陽性菌に有効",C:"30Sリボソームサブユニット阻害、グラム陰性菌に有効",D:"細胞壁合成阻害、MRSAに有効",E:"DNAインターカレーション、グラム陽性菌に有効"},answer:"B",explanation:"クリンダマイシン（リンコマイシン系）は50Sリボソームのペプチジルトランスフェラーゼセンターに結合してペプチド結合形成を阻害する。嫌気性菌・ブドウ球菌・連鎖球菌などグラム陽性菌に有効。偽膜性腸炎（C. difficile）のリスクが高い。"},
  {id:33,difficulty:2,category:"抗ウイルス薬",question:"アシクロビル・バラシクロビルの作用機序として正しいものはどれか。",choices:{A:"ウイルスのNAを阻害してウイルスの細胞外放出を阻害する",B:"ウイルスのM2プロトンチャネルを阻害してウイルス脱核を阻害する",C:"ウイルスチミジンキナーゼにより活性化（リン酸化）され、ウイルスDNAポリメラーゼを阻害する",D:"逆転写酵素を阻害する",E:"HIVプロテアーゼを阻害する"},answer:"C",explanation:"アシクロビルはHSV/VZVのチミジンキナーゼ（TK）によりモノリン酸化→宿主細胞酵素によりトリリン酸化→ウイルスDNAポリメラーゼを競合的に阻害・DNAへの取り込みでチェーン終止。TKを持たない宿主細胞では活性化されないため選択毒性が高い。バラシクロビルはアシクロビルのプロドラッグ（経口バイオアベイラビリティ改善）。"},
  {id:34,difficulty:2,category:"抗ウイルス薬",question:"オセルタミビルの作用機序として正しいものはどれか。",choices:{A:"インフルエンザウイルスのM2プロトンチャネルを阻害する",B:"ウイルスのRNAポリメラーゼを阻害する",C:"ウイルス表面のノイラミニダーゼ（NA）を阻害して感染細胞からのウイルス放出を抑制する",D:"ウイルスの赤血球凝集素（HA）に結合して細胞への吸着を阻害する",E:"宿主細胞のACE2受容体をブロックする"},answer:"C",explanation:"オセルタミビル（タミフル）はノイラミニダーゼ阻害薬。インフルエンザウイルスのNA酵素を阻害することで、感染細胞表面のシアル酸からのウイルス粒子の切断・放出を阻害し、ウイルスの拡散を防ぐ。発症48時間以内の投与が有効。"},
  {id:35,difficulty:2,category:"抗真菌薬",question:"フルコナゾール・イトラコナゾールの共通する作用機序はどれか。",choices:{A:"真菌細胞膜のエルゴステロールに直接結合して細胞膜を障害する",B:"真菌のβ-1,3-グルカン合成酵素を阻害する",C:"真菌のラノステロール14α-脱メチル化酵素（CYP51）を阻害してエルゴステロール合成を抑制する",D:"真菌のDNAポリメラーゼを阻害する",E:"真菌の細胞壁キチン合成を阻害する"},answer:"C",explanation:"アゾール系抗真菌薬（フルコナゾール・イトラコナゾール）はCYP51（ラノステロール14α-脱メチラーゼ）を阻害し、エルゴステロール（真菌細胞膜の主要ステロール）合成を抑制する。CYP酵素を阻害するため多くの薬物相互作用に注意。"},
  {id:36,difficulty:2,category:"偏頭痛治療薬",question:"スマトリプタン・ゾルミトリプタン・エレトリプタン（トリプタン系）の作用機序はどれか。",choices:{A:"COX-2を選択的に阻害して頭痛を抑制する",B:"5-HT1B/1D受容体を刺激して頭蓋内血管を収縮させ、神経ペプチド放出を抑制する",C:"ドパミンD2受容体を遮断して制吐・鎮痛効果を示す",D:"5-HT3受容体を遮断して嘔吐中枢を抑制する",E:"NMDAグルタミン酸受容体を遮断して中枢性痛覚を抑制する"},answer:"B",explanation:"トリプタン系は5-HT1B受容体（頭蓋内血管平滑筋）と5-HT1D受容体（三叉神経末梢）を刺激する選択的作動薬。①血管収縮、②CGRP・サブスタンスPなど神経原性炎症ペプチドの遊離抑制、③三叉神経核での痛覚伝達抑制の3つの機序で片頭痛を改善する。"},
  {id:37,difficulty:2,category:"糖尿病治療薬",question:"インスリンの細胞内シグナル伝達として正しいものはどれか。",choices:{A:"Gタンパク質共役受容体→アデニルシクラーゼ→cAMP増加",B:"チロシンキナーゼ型受容体→IRS-1リン酸化→PI3K→Akt活性化→グルコーストランスポーター（GLUT4）の細胞膜への移行",C:"イオンチャネル型受容体→Na⁺流入→膜脱分極",D:"核内受容体（ステロイドホルモン型）→転写調節",E:"グアニル酸シクラーゼ型受容体→cGMP増加"},answer:"B",explanation:"インスリン受容体はチロシンキナーゼ内蔵型受容体。インスリン結合→受容体の自己リン酸化→IRS（インスリン受容体基質）リン酸化→PI3K/AktおよびMAPKカスケード活性化→GLUT4含む小胞が細胞膜に融合してグルコース取り込み増加（筋肉・脂肪）。"},
  {id:38,difficulty:2,category:"甲状腺ホルモン薬",question:"レボチロキシン（T4）とリオチロニン（T3）の違いとして正しいものはどれか。",choices:{A:"T4は作用が速く、T3は作用が遅い",B:"T4の多くは末梢組織で脱ヨード化酵素によりT3に変換されて活性化される（T4はプロドラッグ的）",C:"T3は核内受容体（TR）に結合せずサイトゾルに留まる",D:"T4はGタンパク質共役受容体を介してcAMPを増加させる",E:"T3は細胞膜受容体に結合して即時的に作用する"},answer:"B",explanation:"甲状腺ホルモン受容体（TR）は核内受容体（リガンド依存性転写因子）。T4は末梢組織（肝・腎・筋肉）で脱ヨード化酵素（type 1, 2 deiodinase）によりT3に変換されてはじめて強い活性を示す。T4は半減期が長く（約7日）、T3は半減期が短く（約1日）、速効性がある。"},
  {id:39,difficulty:2,category:"吸入ステロイド薬",question:"ブデソニドの抗喘息作用の主な機序として正しいものはどれか。",choices:{A:"β2受容体を刺激して気管支平滑筋を弛緩させる",B:"グルココルチコイド受容体（GR）に結合して抗炎症遺伝子の転写を促進し、炎症性サイトカイン産生を抑制する",C:"ロイコトリエン受容体を遮断する",D:"IgEのFcεRI受容体への結合を阻害する",E:"5-リポキシゲナーゼを阻害する"},answer:"B",explanation:"吸入コルチコステロイド（ICS）は細胞内のグルココルチコイド受容体（GR）に結合し、GR-GRE（グルココルチコイド応答配列）複合体が抗炎症タンパク（リポコルチン1等）の転写を促進し、炎症性サイトカイン（IL-4, IL-5, IL-13等）・ケモカイン産生を抑制。吸入製剤は局所作用が主で全身副作用が少ない。"},
  {id:40,difficulty:3,category:"成長ホルモン薬",question:"ソマトロピン（成長ホルモン：GH）の受容体は何型か。",choices:{A:"Gタンパク質共役型受容体（GPCR）",B:"チロシンキナーゼ内蔵型受容体",C:"サイトカイン受容体（クラス1サイトカイン受容体）→JAK2-STAT5シグナル",D:"核内受容体",E:"イオンチャネル型受容体"},answer:"C",explanation:"GH受容体はクラスI型サイトカイン受容体ファミリーに属する。GH結合→受容体二量体化→JAK2（ヤヌスキナーゼ2）の活性化→STAT5リン酸化→核内移行→IGF-1（インスリン様成長因子-1）等の転写促進。"},
  {id:41,difficulty:1,category:"消化器系薬",question:"センノシド（センナ）の下剤としての作用機序はどれか。",choices:{A:"腸管の浸透圧を高めて腸内に水分を引き込む（浸透圧性下剤）",B:"大腸でアンスラキノン（レインアンスロン）に変換されてNa⁺/K⁺-ATPaseを阻害し腸管運動を亢進させる（刺激性下剤）",C:"腸管粘膜を油膜で覆って便を軟化させる（潤滑性下剤）",D:"水分吸収を増加させて腸内容物を膨張させる（膨張性下剤）",E:"5-HT4受容体を刺激して腸管蠕動を促進する"},answer:"B",explanation:"センノシドは大腸内の腸内細菌により活性代謝物（レインアンスロン）に変換される。これが大腸粘膜のNa⁺/K⁺-ATPaseを阻害してNa⁺・水の吸収を抑制し、さらに腸管粘膜を直接刺激して蠕動運動を亢進させる（刺激性下剤）。習慣性に注意。"},
  {id:42,difficulty:2,category:"抗寄生虫薬",question:"イベルメクチンの作用機序はどれか。",choices:{A:"寄生虫のDHFR（ジヒドロ葉酸還元酵素）を阻害する",B:"線虫のグルタミン酸依存性Cl⁻チャネル（GluCl）を活性化して虫体を麻痺させる",C:"寄生虫のヘモグロビン消化を阻害する",D:"寄生虫のβ-チューブリン重合を阻害する",E:"寄生虫のミトコンドリア呼吸鎖を阻害する"},answer:"B",explanation:"イベルメクチンは線虫・節足動物のグルタミン酸依存性Cl⁻チャネル（GluCl）を活性化し持続的に開口させる。Cl⁻流入による過分極が神経筋接合部を麻痺させ虫体を死滅させる。哺乳類のGABA作動性Cl⁻チャネルへの親和性は低く、選択的毒性がある。アルベンダゾールはβ-チューブリン阻害。"},
  {id:43,difficulty:2,category:"降圧薬（メチルドパ）",question:"メチルドパの降圧機序として正しいものはどれか。",choices:{A:"α1受容体を遮断して末梢血管抵抗を低下させる",B:"β1受容体を遮断して心拍出量を低下させる",C:"中枢でα-メチルノルアドレナリン（偽性神経伝達物質）に変換されてα2受容体を刺激し、交感神経活動を抑制する",D:"ACEを阻害してアンジオテンシンII産生を抑制する",E:"Na⁺/K⁺-ATPaseを阻害する"},answer:"C",explanation:"メチルドパは脳内でDOPA脱炭酸酵素によりα-メチルドーパミン→α-メチルノルアドレナリンに変換される。これが脳幹（孤束核）のα2受容体（Gi共役）を刺激して交感神経中枢活動を抑制し、血圧・心拍数を低下させる。妊娠高血圧症候群の第一選択薬として使用される。"},
  {id:44,difficulty:2,category:"降圧薬（直接血管拡張薬）",question:"ヒドララジンの降圧機序はどれか。",choices:{A:"中枢α2受容体刺激",B:"末梢α1受容体遮断",C:"血管平滑筋に直接作用してcGMPを増加させ、血管を拡張させる（直接性血管拡張薬）",D:"ACEを阻害する",E:"Lチャネル遮断"},answer:"C",explanation:"ヒドララジンは動脈平滑筋に直接作用して血管拡張を引き起こす直接作用型血管拡張薬。cGMP増加やK⁺チャネル開口などの機序が関与する。反射性頻脈・体液貯留が生じやすいため、β遮断薬や利尿薬と併用されることが多い。妊娠高血圧症候群の静注薬として使用。"},
  {id:45,difficulty:2,category:"抗菌薬（キノロン系）",question:"フルオロキノロン系抗菌薬（シプロフロキサシン・レボフロキサシン等）を妊婦・小児に原則使用しない理由として最も適切なものはどれか。",choices:{A:"催奇形性（葉酸代謝阻害による神経管閉鎖障害）",B:"未熟な肝酵素（グルクロン酸転移酵素）による代謝障害",C:"未成熟な軟骨への毒性（関節症）を引き起こす可能性",D:"赤芽球症（ビリルビン置換による核黄疸）",E:"乳歯・永久歯の着色（カルシウムとのキレート形成）"},answer:"C",explanation:"動物実験でフルオロキノロン系は負荷軟骨（荷重関節）の軟骨障害（関節症）を引き起こすことが示されており、成長期の小児には原則禁忌。同様の理由で妊婦への投与も慎重。ドキシサイクリン（テトラサイクリン系）はCaとキレートを形成して歯牙着色を引き起こす（選択肢E）。"},
  {id:46,difficulty:1,category:"消化器系薬",question:"ウルソデオキシコール酸（UDCA）の肝臓・胆道への作用として正しいものはどれか。",choices:{A:"胆汁酸の腸肝循環を遮断して胆汁酸の体内蓄積を減少させる",B:"疎水性胆汁酸（細胞毒性が高い）と置換されて胆汁組成を改善し、肝細胞保護・胆石溶解作用を示す",C:"胆のう平滑筋を収縮させて胆汁の排出を促進する",D:"オッジ括約筋を弛緩させる",E:"コレステロール合成酵素（HMG-CoA還元酵素）を阻害する"},answer:"B",explanation:"UDCAは親水性（細胞毒性が低い）の胆汁酸であり、体内の疎水性胆汁酸（コール酸・ケノデオキシコール酸等）の割合を低下させて胆汁を無毒化する。また胆汁中コレステロール飽和度を低下させてコレステロール胆石を溶解する作用もある。"},
  {id:47,difficulty:2,category:"抗菌薬（テトラサイクリン系）",question:"ドキシサイクリン（テトラサイクリン系）の作用機序はどれか。",choices:{A:"細菌の50Sリボソームサブユニットに結合する",B:"細菌の30Sリボソームサブユニットに結合してアミノアシルtRNAのA部位への結合を阻害する",C:"DNAジャイレースを阻害する",D:"PBPに結合して細胞壁合成を阻害する",E:"細菌のRNAポリメラーゼを阻害する"},answer:"B",explanation:"テトラサイクリン系は細菌の30Sリボソームサブユニットに結合し、アミノアシルtRNAがA部位へ到達するのを阻害してタンパク質合成を抑制する。小児の歯牙着色・骨発育障害のため8歳未満・妊婦には原則禁忌。"},
  {id:48,difficulty:1,category:"鎮咳薬",question:"デキストロメトルファンの鎮咳作用の機序として正しいものはどれか。",choices:{A:"末梢の咳受容体（迷走神経求心路）に作用する",B:"中枢の咳中枢（延髄）に作用してμオピオイド受容体を刺激する",C:"延髄の咳中枢にあるNMDA受容体拮抗・シグマ受容体刺激で咳反射を抑制する（非麻薬性）",D:"気管支を拡張させて咳刺激を軽減する",E:"気道分泌を促進して喀出を容易にする"},answer:"C",explanation:"デキストロメトルファンはモルヒナン骨格を持つ非麻薬性中枢性鎮咳薬。μオピオイド受容体への親和性は低く、NMDA受容体拮抗とシグマ受容体作動により咳中枢を抑制する。通常量では依存性・呼吸抑制がほとんどない。"},
  {id:49,difficulty:2,category:"ホルモン薬",question:"デスモプレシンの主な作用はどれか。",choices:{A:"アルドステロン受容体を刺激してNa再吸収を促進する",B:"V2受容体（バソプレシン2型受容体）を刺激して集合管での水再吸収を増加させる",C:"V1受容体を刺激して血管収縮と血圧上昇を引き起こす",D:"GnRH受容体を脱感作させてゴナドトロピン分泌を抑制する",E:"TSH受容体を刺激して甲状腺ホルモン産生を促進する"},answer:"B",explanation:"デスモプレシンはADH（抗利尿ホルモン、バソプレシン）の合成アナログ。V2受容体（Gs共役型、腎集合管基底側に発現）を選択的に刺激し、cAMP→PKA→アクアポリン2（AQP2）の細胞膜への挿入→水再吸収増加→抗利尿作用を示す。尿崩症・夜尿症に使用。"},
  {id:50,difficulty:2,category:"その他（痛風）",question:"アロプリノールの作用機序はどれか。",choices:{A:"尿酸の腎排泄を促進する（尿酸排泄促進薬）",B:"キサンチンオキシダーゼを阻害してヒポキサンチン→キサンチン→尿酸への変換を阻害し尿酸産生を抑制する（尿酸産生抑制薬）",C:"腸管での尿酸吸収を阻害する",D:"尿酸結晶の溶解を促進する",E:"好中球の尿酸結晶への反応（NLRP3インフラマソーム）を抑制する"},answer:"B",explanation:"アロプリノールはキサンチンオキシダーゼの阻害薬。プリン体（ヒポキサンチン・キサンチン）から尿酸への変換を阻害して血清尿酸値を低下させる。腎機能低下者では用量調整が必要。代謝物オキシプリノールも活性を持つ。発作急性期には使用しない（発作を誘発・遷延させる可能性）。"},
  {id:51,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中期以降、血漿量は非妊娠時と比較してどのように変化するか。また分布容積（Vd）への影響として正しいものはどれか。",choices:{A:"血漿量は約20%減少し、分布容積は低下する",B:"血漿量は約40〜50%増加し、水溶性薬物の分布容積が増大して血中濃度が低下しやすい",C:"血漿量は変化しないが、脂肪組織の増加により脂溶性薬物のVdが低下する",D:"血漿量は約10%増加するが、薬物動態への影響はほとんどない",E:"血漿量は増加するが赤血球量も同率で増加するため希釈効果は生じない"},answer:"B",explanation:"妊娠中期〜後期にかけて血漿量は40〜50%増加（赤血球量は20〜30%増加）し、希釈性貧血が生じる。水溶性薬物（アミノグリコシド系・βラクタム系など）の分布容積が増大し、同一投与量では血中濃度が低下しやすい。治療域が狭い薬物では増量が必要になることがある。"},
  {id:52,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中は血清アルブミン濃度が低下する。高タンパク結合薬（例：フェニトイン・ワルファリン）の薬効への影響として正しいものはどれか。",choices:{A:"タンパク結合率が低下し、遊離型（活性型）薬物濃度が上昇して薬効・副作用が増強する可能性がある",B:"タンパク結合率が低下することで薬物の半減期が延長し、蓄積しやすくなる",C:"総薬物濃度が上昇するため薬効が増強する",D:"タンパク結合率の低下により腎排泄が低下し、薬物が蓄積する",E:"アルブミン低下は薬物動態に影響しない"},answer:"A",explanation:"妊娠中はアルブミン濃度が低下するため、高タンパク結合薬では遊離型（薬理活性型）の割合が増加する。総薬物濃度は低値に見えても遊離型濃度は正常範囲であることがある。フェニトインのTDMでは遊離型濃度の測定が推奨される。"},
  {id:53,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中の糸球体濾過率（GFR）の変化と、用量調整が必要な薬剤の組み合わせとして最も適切なものはどれか。",choices:{A:"GFRは約30%低下するため、腎排泄型薬物は蓄積しやすく減量が必要",B:"GFRは約50%増加するため、腎排泄型薬物（リチウム・アミノグリコシド系等）は血中濃度が低下しやすく増量または頻回投与が必要になることがある",C:"GFRは変化しないため腎排泄型薬物の用量調整は不要",D:"GFRは変動するが腎排泄型薬物の用量には影響しない",E:"GFRは低下するため血清クレアチニン値が上昇する"},answer:"B",explanation:"妊娠中はGFRが約40〜60%増加し、腎血漿流量も増大する。腎排泄型薬物（リチウム・アミノグリコシド系・βラクタム系・ジゴキシン等）のクリアランスが上昇し血中濃度が低下しやすい。なお妊娠中の血清クレアチニンは正常値より低下するため「正常値」が偽高値に見えることに注意。"},
  {id:54,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中のCYP（チトクロームP450）酵素活性の変化として正しいものはどれか。",choices:{A:"すべてのCYPが同様に増加する",B:"CYP3A4・CYP2D6は活性が増加し、CYP1A2・CYP2C19は活性が低下する",C:"CYP1A2が最も増加し、テオフィリンの代謝が亢進する",D:"CYP2C9のみ増加し、ワルファリンの必要量が増加する",E:"すべてのCYPが低下するため肝代謝型薬物は蓄積しやすい"},answer:"B",explanation:"妊娠中のCYP変化は酵素によって異なる。CYP3A4（ニフェジピン・タクロリムス等）・CYP2D6（メトプロロール等）・CYP2C9（フェニトイン等）は活性増加→血中濃度低下傾向。一方CYP1A2（テオフィリン・カフェイン等）・CYP2C19（PPI等）は活性低下→血中濃度上昇傾向。妊娠中はTDMが重要。"},
  {id:55,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中の消化管変化が薬物吸収に与える影響として正しいものはどれか。",choices:{A:"妊娠中はプロゲステロンの影響で消化管運動が亢進し、薬物吸収が速まる",B:"妊娠中はプロゲステロンにより消化管運動が低下（胃排出遅延・腸管通過時間延長）し、薬物吸収速度が低下するがAUCへの影響は薬物により異なる",C:"妊娠中は胃酸分泌が増加し、酸不安定な薬物の吸収が低下する",D:"消化管の変化は吸収に影響せず、妊娠中の吸収は非妊娠時と同一",E:"消化管運動が亢進するためCmaxが上昇する"},answer:"B",explanation:"妊娠中はプロゲステロンの平滑筋弛緩作用により胃排出が遅延し、腸管通過時間が延長する。薬物吸収のTmaxが遅れることがあり、つわりによる嘔吐も経口薬吸収を妨げる。胃酸分泌は妊娠初期に低下し後期に回復する傾向がある。"},
  {id:56,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中の皮膚血流変化が経皮吸収型製剤に与える影響として正しいものはどれか。",choices:{A:"妊娠中は皮膚血流が約30〜40%増加し、貼付剤・クリーム剤の全身曝露量が増加する可能性がある",B:"妊娠中は皮膚が厚くなり経皮吸収が低下する",C:"経皮吸収に影響する変化は妊娠中に生じない",D:"妊娠中の角質層の変化により水溶性薬物の吸収のみが増加する",E:"経皮吸収の変化は妊娠後期（28週以降）にのみ生じる"},answer:"A",explanation:"妊娠中はエストロゲンの影響による皮膚血流増加（最大40%増）があり、経皮吸収型製剤（局所ステロイド・ニトログリセリンパッチ等）の全身曝露が増大する可能性がある。局所塗布の副腎皮質ステロイドは広範囲・長期使用で胎児副腎抑制のリスクがある。"},
  {id:57,difficulty:2,category:"胎盤通過性",question:"薬物の胎盤通過性を規定する因子として、最も通過しやすい薬物の特性はどれか。",choices:{A:"分子量が大きい（>1000Da）・水溶性・タンパク結合率が高い",B:"分子量が小さい（<500Da）・脂溶性が高い・タンパク結合率が低い・非イオン化型が多い",C:"分子量が小さい・水溶性・タンパク結合率が低い",D:"脂溶性が高い・タンパク結合率が高い・分子量が大きい",E:"イオン化型が多い・脂溶性が高い・分子量が中程度"},answer:"B",explanation:"胎盤通過は主に受動拡散による。①分子量が小さい（目安<500Da、>1000Daはほとんど通過しない）、②脂溶性が高い（lipophilic）、③タンパク結合率が低い（遊離型が多い）、④非イオン化型が多い、の薬物が通過しやすい。ヘパリン（高分子量）・インスリン（高分子量）は胎盤を通過しにくい。"},
  {id:58,difficulty:2,category:"胎盤通過性",question:"ヘパリン（未分画）、低分子ヘパリン（ダルテパリン）、ワルファリンの胎盤通過性の比較として正しいものはどれか。",choices:{A:"3剤とも胎盤を通過するため妊婦には禁忌",B:"ヘパリン・低分子ヘパリンは分子量が大きく胎盤を通過しない。ワルファリンは分子量が小さく脂溶性が高いため胎盤を通過し、胎児に出血リスクや催奇形性をもたらす",C:"ワルファリンは胎盤を通過しないが、ヘパリンは通過する",D:"低分子ヘパリンのみ胎盤を通過し、未分画ヘパリンは通過しない",E:"3剤とも胎盤を通過せず妊婦に安全に使用できる"},answer:"B",explanation:"ヘパリン（分子量15,000〜18,000Da）および低分子ヘパリン（4,000〜8,000Da）は高分子量のため胎盤を通過しない。ワルファリン（分子量約308Da・脂溶性）は胎盤を容易に通過し、胎児の凝固因子合成阻害（ワルファリン胎芽病、特に妊娠6〜12週）・胎児出血リスクがある。妊娠中の抗凝固療法では原則ヘパリン系が使用される。"},
  {id:59,difficulty:2,category:"胎盤通過性",question:"インスリンの胎盤通過性について正しいものはどれか。",choices:{A:"インスリンは脂溶性が高いため胎盤を容易に通過し、胎児低血糖を引き起こす",B:"インスリンは分子量が大きいタンパク質（約6000Da）であり胎盤をほとんど通過しないため、妊娠糖尿病の治療に安全に使用できる",C:"インスリンは活性輸送によって胎盤を通過する",D:"インスリンは妊娠中期以降に胎盤通過性が増大する",E:"インスリンは胎盤通過後、胎児肝臓で速やかに不活化されるため安全"},answer:"B",explanation:"インスリンは分子量約6,000Daのポリペプチドホルモンでありサイズが大きいため、胎盤をほとんど通過しない。このため妊娠糖尿病・糖尿病合併妊娠の治療薬として安全に使用できる。なお、母体高血糖→胎児高血糖→胎児膵β細胞からのインスリン分泌亢進という間接的な経路で胎児に影響を与えることには注意が必要。"},
  {id:60,difficulty:2,category:"胎盤通過性",question:"ACE阻害薬（エナラプリル等）とARB（カンデサルタン等）が妊娠中期・後期に禁忌とされる主な理由はどれか。",choices:{A:"催奇形性が高く、すべての妊娠週数で禁忌",B:"胎盤を通過して胎児のレニン-アンジオテンシン系を抑制し、胎児・新生児の腎機能障害（尿細管形成不全・腎不全）・羊水過少症・頭蓋骨低形成・新生児死亡を引き起こす",C:"母体の血圧を下げすぎて胎盤血流を低下させることのみが問題",D:"母乳への移行量が多く授乳婦に禁忌だが妊娠中は使用可能",E:"薬物の胎盤通過性がないため問題は母体副作用のみ"},answer:"B",explanation:"ACE阻害薬・ARBは胎盤を通過し、胎児のRAS（レニン-アンジオテンシン系）を阻害する。胎児の腎臓はアンジオテンシンIIに依存して発達するため、妊娠中期（14週）以降の曝露で胎児腎機能障害・羊水過少・肺低形成・頭蓋骨形成不全などの重篤な胎児毒性を引き起こす。発覚次第すぐに中止が必要。"},
  {id:61,difficulty:2,category:"胎盤通過性",question:"胎盤においてP糖タンパク（P-gp）が果たす役割として正しいものはどれか。",choices:{A:"P-gpは胎盤の母体側に発現し、薬物を母体血中に能動輸送して胎盤通過を促進する",B:"P-gp（ABCB1）は胎盤栄養膜細胞の母体側（刷子縁膜）に発現し、基質薬物を胎児側から母体側に汲み出す排出輸送体として機能し、胎児への薬物曝露を制限する",C:"P-gpは胎盤には発現せず血液脳関門のみに存在する",D:"P-gpは妊娠後期にのみ発現し妊娠初期の胎児は保護されない",E:"P-gpは胎盤でインスリンのみを輸送する特異的な輸送体である"},answer:"B",explanation:"P糖タンパク（P-gp、ABCB1）は胎盤栄養膜細胞の刷子縁膜（母体側）に発現し、基質薬物（ジゴキシン・タキサン系等）を胎児側→母体側に能動的に輸送して胎児への薬物曝露を制限する「胎盤バリア」として機能する。ただし非基質薬物はこの制限を受けない。"},
  {id:62,difficulty:2,category:"胎盤通過性",question:"ドキシサイクリン（テトラサイクリン系）の妊婦・小児への影響として正しいものはどれか。",choices:{A:"胎盤を通過しないため妊婦に安全に使用できる",B:"Ca²⁺とキレートを形成して胎児・新生児の骨や歯牙に沈着し、骨発育障害・歯牙着色（黄褐色）を引き起こす。妊娠中・8歳未満には原則禁忌",C:"胎盤を通過するが乳汁中では不活化されるため授乳婦には安全",D:"歯牙着色は永久歯にのみ影響し乳歯には影響しない",E:"テトラサイクリン系は骨への沈着はなく腎毒性のため妊婦禁忌"},answer:"B",explanation:"テトラサイクリン系はCa²⁺とキレート複合体を形成し、活発に石灰化が進んでいる骨や歯牙組織に沈着する。胎盤を通過するため妊娠中期以降（骨・歯牙形成期）の使用で胎児の骨発育障害・乳歯変色（黄〜褐色）が生じる。授乳中も乳汁に移行するため哺乳乳幼児でも同様の問題が生じうる。妊婦・8歳未満に原則禁忌。"},
  {id:63,difficulty:2,category:"母乳移行性",question:"薬物の母乳への移行量を規定する因子として正しいものはどれか。",choices:{A:"分子量が大きいほど母乳に移行しやすい",B:"脂溶性が高い・分子量が小さい・タンパク結合率が低い・非イオン化型が多いほど母乳に移行しやすい",C:"水溶性薬物は母乳（脂肪を含む）に特異的に高濃度で移行する",D:"タンパク結合率が高いほど母乳移行量が増加する",E:"経口バイオアベイラビリティが低い薬物ほど母乳に移行しやすい"},answer:"B",explanation:"母乳移行は主に受動拡散で、①脂溶性が高い（母乳は脂肪含量が高い）、②分子量が小さい（<200Daは容易に通過、>1000Daはほとんど通過しない）、③タンパク結合率が低い（遊離型のみ移行）、④非イオン化型が多い、薬物で移行量が多い。また乳汁のpH（約7.0）は血漿（7.4）より低いため弱塩基性薬物がイオントラッピングされる。"},
  {id:64,difficulty:2,category:"母乳移行性",question:"授乳安全性の評価指標RID（相対乳児投与量）について正しいものはどれか。",choices:{A:"RIDは母親の1日投与量に対する乳児が母乳から摂取する1日推定量の割合で、一般的にRID<10%であれば授乳を継続できる可能性が高い",B:"RIDは乳汁中薬物濃度と血漿中薬物濃度の比（M/P比）と同じ意味である",C:"RIDが高いほど乳児への影響は少ない",D:"RIDは乳汁分泌量に関係なく計算できる",E:"RIDの基準値は5%未満であり、5〜10%では必ず授乳中止が必要"},answer:"A",explanation:"RID（Relative Infant Dose）＝（乳児が母乳経由で摂取する薬物量 mg/kg/日）÷（母親の投与量 mg/kg/日）×100(%)。一般にRID<10%なら授乳継続可能とされる（Hale基準）。RID<1%は非常に安全、10〜25%は要注意、>25%は授乳中止検討。M/P比はRID計算に用いるが別の指標。新生児・未熟児・腎機能未熟な乳児では個別評価が必要。"},
  {id:65,difficulty:2,category:"母乳移行性",question:"母乳のpHは約7.0で血漿pH7.4より低い。弱塩基性薬物の乳汁移行への影響として正しいものはどれか。",choices:{A:"弱塩基性薬物は乳汁中でプロトン化（イオン化）されて細胞膜を通過できなくなり、乳汁中に蓄積する（イオントラッピング）",B:"弱塩基性薬物は乳汁のpHが低いため吸収されにくく、乳汁中濃度は低い",C:"弱酸性薬物が乳汁中に蓄積し、弱塩基性薬物は影響を受けない",D:"pHの差は小さいため薬物の乳汁移行に実質的な影響はない",E:"すべての薬物が均等にイオントラッピングされる"},answer:"A",explanation:"弱塩基性薬物は乳汁（pH≈7.0）でより高度にプロトン化（陽イオン型）し、膜を通過できないため乳汁中に閉じ込められる（イオントラッピング）。これによりM/P比>1となり乳汁中濃度が血漿より高くなりうる。逆に弱酸性薬物は血漿側によりイオン化されるため乳汁移行が少ない傾向がある。"},
  {id:66,difficulty:2,category:"母乳移行性",question:"ワルファリンの授乳中の安全性について正しいものはどれか。",choices:{A:"ワルファリンは高タンパク結合率（約99%）のため乳汁への遊離型移行量が極めて少なくRIDが低い。授乳婦での使用が可能とされている",B:"ワルファリンはM/P比が高く乳児に出血リスクがあるため授乳禁忌",C:"ワルファリンは経口バイオアベイラビリティが低いため乳児には影響しない",D:"ワルファリンは分子量が大きく母乳に移行しない",E:"ワルファリンは授乳中は低分子ヘパリンへの変更が必須"},answer:"A",explanation:"ワルファリンはタンパク結合率が約99%と非常に高いため、乳汁中に移行する遊離型薬物は極めて少ない。RIDは約0.08%と非常に低く、授乳中の乳児のPT/INRへの影響はほとんど報告されていない。国立成育医療研究センターの授乳安全薬リストにも含まれており授乳継続可能とされている。"},
  {id:67,difficulty:2,category:"母乳移行性",question:"ダルテパリン（低分子ヘパリン）の授乳中の安全性について正しいものはどれか。",choices:{A:"分子量が大きいため乳汁にほとんど移行せず、移行しても消化管でほぼ分解されるため乳児への影響はほとんどない",B:"低分子ヘパリンは血液凝固を阻害するため乳汁中濃度に関係なく授乳禁忌",C:"低分子ヘパリンは脂溶性が高く乳汁に高濃度で移行する",D:"低分子ヘパリンは腸管から吸収されるため乳児の出血リスクがある",E:"低分子ヘパリンはワルファリンと同様のRIDで評価すべきである"},answer:"A",explanation:"低分子ヘパリン（ダルテパリン等、分子量4,000〜8,000Da）は高分子量・親水性のため乳汁への移行量は極めて少ない。また万一乳汁中に移行しても消化管からほとんど吸収されない（経口F値<1%）ため、乳児への全身的な抗凝固作用は生じない。授乳中の使用が可能とされている。"},
  {id:68,difficulty:2,category:"母乳移行性",question:"授乳中に使用を避けるべき薬剤とその理由の組み合わせとして正しいものはどれか。",choices:{A:"メトクロプラミド：乳汁分泌を抑制するため",B:"アミオダロン（ヨード含有）：高濃度のヨードが乳汁に移行し、乳児の甲状腺機能に影響する",C:"アセトアミノフェン：乳汁移行量が多く乳児に肝毒性をもたらす",D:"イブプロフェン：乳汁中濃度が高く乳児の腎機能を障害する",E:"ワルファリン：乳汁移行量が多く乳児に出血を引き起こす"},answer:"B",explanation:"アミオダロンはヨード含有量が多く（薬物重量の約37%がヨード）、乳汁移行量も多い。M/P比は約3〜6と高く、乳児が摂取すると過剰ヨードによる甲状腺機能低下（甲状腺腫）を引き起こすリスクがある。また半減期が極めて長い（約40〜55日）ことも問題。授乳中は原則禁忌。"},
  {id:69,difficulty:2,category:"母乳移行性",question:"授乳中の母親が薬を服用する際、乳児への薬物曝露を最小化する実践的な方法として最も適切なものはどれか。",choices:{A:"授乳直前に薬を服用し、薬が乳汁に移行する前に授乳を終わらせる",B:"授乳直後に薬を服用し、次回授乳まで（一般的に3〜4時間）の間に薬物が代謝・排泄されるようにする",C:"薬の服用時刻に関わらず乳汁中濃度は変わらない",D:"乳汁中薬物濃度のピークは服用後24時間後のためタイミングは関係ない",E:"就寝前に服用すれば夜間の授乳での曝露を避けられる"},answer:"B",explanation:"多くの薬物では乳汁中濃度のピークは服用後1〜3時間（血漿濃度ピークに近い時間帯）に来る。そのため授乳直後に服用することで次回授乳（3〜4時間後）までに乳汁中濃度が低下する。ただしこの方法は半減期が短い薬物に有効であり、半減期が長い薬物（アミオダロン等）には効果がない。"},
  {id:70,difficulty:2,category:"母乳移行性",question:"乳児が母乳中の薬物を摂取した場合の安全性評価において、経口バイオアベイラビリティ（F値）が果たす役割として正しいものはどれか。",choices:{A:"F値が高い薬物ほど乳汁中濃度が高くなる",B:"薬物のF値が低い場合、乳児の消化管からの吸収量も少なくなるため、M/P比が高くてもリスクが低くなりうる",C:"F値は乳汁移行性には関係なく母親の吸収率のみを示す指標",D:"F値が高い薬物は乳汁移行が少ない",E:"F値は薬物の授乳安全性評価に使用されない"},answer:"B",explanation:"RIDはあくまで乳汁中に移行した薬物量の推定であり、実際に乳児の体内に吸収される量にはF値が関係する。例えばバンコマイシンはRIDが比較的高いが経口F値がほぼ0%（腸管から吸収されない）のため、乳汁経由での全身影響はほぼない。F値も合わせて評価することでより正確な授乳安全性判断ができる。"},
  {id:71,difficulty:2,category:"母乳移行性",question:"スルホンアミド系薬・ニトロフラントインを新生児期（生後1ヶ月未満）に間接的に使用を避ける理由として正しいものはどれか。",choices:{A:"新生児の未熟な肝臓でグルクロン酸抱合能が低く、遊離型ビリルビンがアルブミンから置換されて核黄疸（ビリルビン脳症）を引き起こすリスクがある",B:"新生児の腎機能が未熟なため排泄されず蓄積する",C:"新生児に免疫抑制をもたらす",D:"新生児のGABA受容体に結合して神経毒性を示す",E:"新生児では腸内細菌の発達を妨げる"},answer:"A",explanation:"新生児では肝臓のグルクロン酸転移酵素（UGT）活性が未熟であり、間接（遊離）ビリルビンの抱合・排泄能が低い。スルホンアミド系はアルブミン結合部位をビリルビンと競合して置換し、遊離ビリルビン血中濃度を上昇させて核黄疸リスクを高める。ニトロフラントインはG6PD欠損新生児で溶血性貧血を引き起こす。"},
  {id:72,difficulty:2,category:"母乳移行性",question:"授乳中に推奨度が高いNSAIDsとして正しいものはどれか。理由も含めて適切なものを選べ。",choices:{A:"インドメタシン（RIDが低く最も安全）",B:"イブプロフェン（RID<1%・タンパク結合率約99%で乳汁移行が非常に少なく、授乳中のNSAIDsとして推奨される）",C:"ロキソプロフェン（活性代謝物の乳汁移行が確認されていないため最安全）",D:"セレコキシブ（COX-2選択性があるため乳汁移行がない）",E:"アスピリン（低用量なら安全）"},answer:"B",explanation:"イブプロフェンはRID<1%で、タンパク結合率が約99%と高いため乳汁への遊離型移行が非常に少ない。授乳中の第一選択鎮痛薬の一つとして推奨される。ナプロキセン（RID約3%）も許容範囲とされる。アスピリンは高用量でライ症候群リスク・乳児出血リスクがあり推奨されない。"},
  {id:73,difficulty:2,category:"母乳移行性",question:"授乳婦への薬物投与において安全性を高めるための原則として誤っているものはどれか。",choices:{A:"RIDが低い薬物を選択する（同効薬の中でより乳汁移行が少ないものを選ぶ）",B:"必要最低限の期間・用量で使用する",C:"授乳直後に服用し次回授乳までに血中濃度を下げる",D:"添付文書に「授乳中は禁忌」と記載されている薬物はすべて実際に乳児に有害であることが臨床試験で証明されている",E:"新生児・低出生体重児・腎機能未熟な乳児では通常の乳児より慎重に評価する"},answer:"D",explanation:"添付文書の「授乳中投与しないこと」の記載は、必ずしも実際の臨床的有害性が証明されているわけではない。安全性データの欠如から製薬企業が法的保護のために記載していることが多く、欧米の専門データベース（LactMed・Hale's等）では使用可能と判断されている薬物も少なくない。授乳安全性評価には個別の薬物動態データ・RID・臨床報告を総合的に判断することが必要。"},
  {id:74,difficulty:3,category:"妊娠中の薬物動態",question:"葉酸（フォリン酸）補充が妊娠前から妊娠初期に推奨される主な理由はどれか。",choices:{A:"妊娠中の鉄欠乏性貧血を予防するため",B:"神経管閉鎖障害（二分脊椎・無脳症等）のリスクを低減するため。葉酸はDNA合成・細胞増殖に必須であり、閉鎖時期（受精後3〜4週）以前からの補充が必要",C:"妊娠悪阻（つわり）を改善するため",D:"胎盤形成を促進して流産を予防するため",E:"胎児の骨格発育に必要なカルシウム代謝を補助するため"},answer:"B",explanation:"葉酸（ビタミンB9）は一炭素単位代謝を介してDNA・RNAの合成・修復・細胞分裂に必須。神経管は受精後約3〜4週（多くの女性が妊娠を認識する前）に閉鎖するため、妊娠を希望する段階から1日400μgの補充が推奨される（NTD発症リスクを約50〜70%低減）。バルプロ酸・メトトレキサート等は葉酸代謝阻害によりリスクを高めるため、高用量補充が必要。"},
  {id:75,difficulty:3,category:"妊娠中の薬物動態",question:"妊娠中の1回換気量の変化が吸入薬に与える影響として正しいものはどれか。",choices:{A:"妊娠中は1回換気量が約40%増加し分時換気量が増大するため、吸入薬の肺到達量が増加する可能性がある",B:"妊娠中は横隔膜が下降するため肺容量が増大し、吸入薬が希釈されて効果が低下する",C:"妊娠中の呼吸機能変化は吸入薬の薬物動態に影響を与えない",D:"妊娠中は呼吸回数が減少するため吸入薬の効果が低下する",E:"妊娠中は気道抵抗が増大するため吸入薬の肺到達量が低下する"},answer:"A",explanation:"妊娠中はプロゲステロンによる呼吸中枢刺激と子宮増大による横隔膜挙上で、1回換気量が約40%増加し分時換気量が増大する（呼吸数は大きく変化しない）。機能的残気量（FRC）は低下する。この変化により吸入麻酔薬の誘導が速くなることが知られており、吸入薬全般で肺到達量の変化を考慮する必要がある。"}
  ,
  {id:76,difficulty:2,category:"周産期医療・生理学",question:"妊娠中にhCG（ヒト絨毛性ゴナドトロピン）が分泌されることの主な生理的意義はどれか。",choices:{A:"胎盤形成を直接促進し、胎盤血流を維持する",B:"黄体を維持してプロゲステロン分泌を継続させ、妊娠を維持する",C:"子宮内膜の脱落膜化を引き起こす",D:"分娩時に子宮収縮を誘発する",E:"乳腺の発育を促進して授乳に備える"},answer:"B",explanation:"hCGは受精卵（栄養膜細胞）から分泌され、黄体を維持してプロゲステロンの産生を継続させる。プロゲステロンは子宮内膜を分泌期に保ち、妊娠を維持するために不可欠。hCG値は妊娠8〜10週頃にピークを迎え、その後低下する。妊娠悪阻（つわり）の発症時期とhCGピークが一致することから関連が示唆されている。"},
  {id:77,difficulty:2,category:"周産期医療・生理学",question:"妊娠中のプロゲステロンの作用として誤っているものはどれか。",choices:{A:"子宮筋の弛緩維持（早産防止）",B:"頸管粘液の粘稠度を高めて感染を防ぐ",C:"胃食道括約筋を弛緩させて胃食道逆流を促進する",D:"体温を上昇させる（高温相）",E:"子宮内膜の増殖期への移行を促進する"},answer:"E",explanation:"プロゲステロンは子宮内膜を分泌期（黄体期）に維持するホルモンであり、増殖期への移行を促進するのはエストロゲンの作用である。プロゲステロンの主な作用は子宮筋弛緩、頸管粘液粘稠化、基礎体温上昇、胃食道括約筋弛緩（副作用的作用）など。"},
  {id:78,difficulty:2,category:"周産期医療・生理学",question:"妊娠中の循環血液量の変化として最も正しいものはどれか。",choices:{A:"循環血液量は妊娠中に変化しない",B:"循環血液量は約10〜15%増加し、出産後に戻る",C:"循環血液量は約40〜50%増加し、それに伴い血液希釈が生じる",D:"循環血液量は増加するが赤血球量は減少する",E:"循環血液量増加により血圧は著明に上昇する"},answer:"C",explanation:"妊娠中は循環血液量が妊娠前と比べて約40〜50%増加する。このうち血漿量の増加（約50%）が赤血球量の増加（約25〜30%）を上回るため、ヘマトクリット・ヘモグロビン値が相対的に低下する（生理的貧血）。また、循環血液量増加にもかかわらず末梢血管抵抗低下により血圧は通常低下傾向となる。"},
  {id:79,difficulty:2,category:"周産期医療・生理学",question:"妊娠中の腎機能変化として正しいものはどれか。",choices:{A:"糸球体濾過量（GFR）は妊娠前の約40〜60%に低下する",B:"GFRは約40〜60%増加し、血清クレアチニン値は低下する",C:"腎血流量は変化しないがGFRのみ増加する",D:"GFR増加により薬物の腎排泄は全薬物で低下する",E:"妊娠後期に腎機能は正常範囲に戻る"},answer:"B",explanation:"妊娠中は腎血流量・GFRがともに約40〜60%増加する。その結果、血清クレアチニン・BUN・尿酸値は非妊娠時より低値となる（非妊娠時正常値でも妊娠中は相対的に高値と解釈する場合もある）。腎排泄型薬物（ゲンタマイシン、アンピシリン等）はクリアランスが増大し、投与量調整が必要になる場合がある。"},
  {id:80,difficulty:2,category:"周産期医療・生理学",question:"妊娠中の消化管変化として正しいものはどれか。",choices:{A:"胃酸分泌が増加して消化性潰瘍リスクが上昇する",B:"胃排出時間が短縮するため薬物の吸収速度が上がる",C:"腸管運動が低下し便秘になりやすく、胃排出時間も延長する",D:"食道下部括約筋の締まりが増し、胃食道逆流は減少する",E:"小腸での薬物吸収は変化しない"},answer:"C",explanation:"妊娠中のプロゲステロンは平滑筋弛緩作用を持ち、腸管蠕動低下による便秘、食道下部括約筋弛緩による胃食道逆流（胸焼け）を引き起こす。また胃排出時間（gastric emptying time）が延長するため、経口薬のTmaxが遅延し吸収速度が低下する。ただし小腸での最終的な吸収量（バイオアベイラビリティ）は必ずしも変化しない。"},
  {id:81,difficulty:2,category:"周産期医療・生理学",question:"妊娠週数の数え方として正しいものはどれか。",choices:{A:"受精日を0日として計算し、受精後40週で正期産とする",B:"最終月経開始日を0日として計算し、40週0日（280日）前後が正期産の目安",C:"着床日を基準とし、着床から38週で正期産とする",D:"超音波検査での胎児頭殿長（CRL）のみで算出する",E:"最終月経開始日の14日後（排卵日）から計算する"},answer:"B",explanation:"産科的妊娠週数は最終月経（LMP）の開始日を0日として計算する。満40週（280日目）前後が正期産（37週0日〜41週6日）の目安。超音波でのCRL測定は妊娠週数の確認・修正に使われるが、基本はLMPから計算する。排卵・受精は通常LMPから約14日後なので、実際の受精から分娩まではおよそ38週。"},
  {id:82,difficulty:2,category:"周産期医療・生理学",question:"オキシトシンの産科的役割として正しい記述の組み合わせはどれか。①子宮平滑筋を収縮させ、分娩時の陣痛を誘発・促進する ②授乳時の射乳反射を引き起こす ③妊娠初期から持続的に分泌され黄体を維持する ④産後の子宮収縮（子宮退縮）を促進して出血を減少させる",choices:{A:"①②③",B:"①②④",C:"②③④",D:"①③④",E:"①②③④"},answer:"B",explanation:"オキシトシンは視床下部で産生され下垂体後葉から分泌される。主な産科的作用は①子宮収縮誘発・促進（陣痛誘発薬として使用）、②射乳反射（授乳刺激により分泌）、④産後の子宮退縮促進。③黄体維持はhCGの作用であり、オキシトシンの役割ではない。"},
  {id:83,difficulty:2,category:"周産期医療・生理学",question:"産褥期（出産後）の生理的変化として正しいものはどれか。",choices:{A:"プロラクチンは産後に著明に低下し、授乳促進には関与しない",B:"子宮は産後4〜6週をかけて非妊娠時の大きさに戻る（子宮退縮）",C:"産後のエストロゲン・プロゲステロンは直ちに妊娠中と同レベルを維持する",D:"授乳しない場合は産後2〜3週で月経が再開する",E:"産後のGFR低下により腎排泄型薬物の投与量を増量する必要がある"},answer:"B",explanation:"子宮退縮（involution）は産後6週をかけて進行し、非妊娠時の大きさに戻る。産後はエストロゲン・プロゲステロンが急激に低下しプロラクチンが上昇して乳汁分泌が促進される。授乳しない場合でも月経再開は通常産後6〜8週以降。産後はGFRが妊娠前値に戻る。"},
  {id:84,difficulty:2,category:"周産期医療・生理学",question:"妊娠中の血清アルブミン値の変化と薬物動態への影響として正しいものはどれか。",choices:{A:"妊娠中は血清アルブミンが増加するため、薬物の蛋白結合率が上昇する",B:"妊娠中は血清アルブミンが低下するため、高タンパク結合薬の遊離型（活性型）分率が増加しうる",C:"血清アルブミン変化は薬物動態に影響しない",D:"妊娠中はα1酸性糖タンパクが著明に増加する",E:"蛋白結合率変化は腎排泄型薬物にのみ影響する"},answer:"B",explanation:"妊娠中は循環血液量増大による希釈効果でアルブミン濃度が約15〜20%低下する。高タンパク結合薬（フェニトイン、バルプロ酸等）では遊離型分率が増加し、見かけ上の薬効・副作用リスクが変化しうる（ただしクリアランスも変化するため複雑）。α1酸性糖タンパクは妊娠中に低下傾向。"},
  {id:85,difficulty:2,category:"周産期医療・生理学",question:"妊娠中のCYP酵素活性変化として最も正しいものはどれか。",choices:{A:"すべてのCYP酵素活性が妊娠中に均等に増加する",B:"CYP3A4は妊娠中に活性増加し、CYP1A2は活性低下する傾向がある",C:"妊娠中はすべてのCYP酵素活性が抑制される",D:"CYP2D6活性は妊娠中に変化しない",E:"CYP酵素活性変化は授乳期のみに起こる"},answer:"B",explanation:"妊娠中のホルモン環境変化により各CYP酵素の活性が異なる方向に変化する。CYP3A4（ニフェジピン・ミダゾラム等の代謝）は増加、CYP1A2（カフェイン・クロザピン等の代謝）は低下、CYP2D6（メトプロロール・コデイン等の代謝）は増加傾向。CYP2C19は低下傾向。このため薬物の投与量調整が必要となる場合がある。"}
  ,
  {id:86,difficulty:2,category:"胎児・新生児",question:"薬物催奇形性における「絶対過敏期（器官形成期）」とはどの時期か。",choices:{A:"受精後1〜2週（着床前期）",B:"受精後3〜8週（器官形成期）",C:"妊娠中期（13〜27週）",D:"妊娠後期（28週以降）",E:"分娩直前（39〜40週）"},answer:"B",explanation:"器官形成期（受精後3〜8週、最終月経換算で5〜10週頃）は各臓器の原基が形成される最も重要な時期であり、薬物・放射線等への感受性が最も高い「絶対過敏期」とも呼ばれる。着床前期（受精後1〜2週）は全か無かの法則が働き、損傷すれば流産、回復すれば正常発育となる。妊娠中期・後期の薬物曝露は機能障害や発育遅延を引き起こすことはあるが、形態奇形は生じにくい。"},
  {id:87,difficulty:2,category:"胎児・新生児",question:"新生児の生理的黄疸のメカニズムとして正しいものはどれか。",choices:{A:"新生児は成人より多量のビリルビンを産生し、かつ肝臓のUDP-グルクロン酸転移酵素（UGT1A1）活性が低いため非抱合型ビリルビンが蓄積する",B:"新生児の赤血球寿命は成人より長いためビリルビン産生が増加する",C:"新生児の腎臓がビリルビンを排泄できないため高ビリルビン血症が生じる",D:"新生児は胆汁酸合成能が低いためビリルビンを腸管から排泄できない",E:"母乳中のビリルビンが吸収されて蓄積する"},answer:"A",explanation:"新生児黄疸の主なメカニズムは①胎児型ヘモグロビン（HbF）から成人型への切り替えに伴う赤血球の大量破壊によるビリルビン産生増加、②肝臓のUGT1A1活性が未発達で非抱合型ビリルビンのグルクロン酸抱合能が低いこと、③腸肝循環の亢進。フェノバルビタールはUGT1A1を誘導して黄疸改善に使用されることがある。"},
  {id:88,difficulty:2,category:"胎児・新生児",question:"新生児（生後1ヶ月未満）の薬物代謝能の特徴として正しいものはどれか。",choices:{A:"新生児のCYP3A4活性は成人と同等であり薬物代謝は問題ない",B:"新生児はCYP酵素活性が全般的に未熟であり、多くの薬物のクリアランスが低下する",C:"新生児は腸管からの薬物吸収が成人より低いため薬効が弱い",D:"新生児の薬物代謝能は出生直後から成人と同等に機能する",E:"新生児ではフェーズII反応（抱合反応）のみが完成しており、フェーズI反応は未発達である"},answer:"B",explanation:"新生児期はCYP1A2・CYP2C9・CYP2D6・CYP3A4などの酸化代謝酵素、グルクロン酸抱合（UGT）・硫酸抱合など抱合反応酵素がいずれも未発達。特にUGT未発達によるクロラムフェニコール蓄積が「グレイベビー症候群」を引き起こした歴史がある。腎排泄も未熟（GFR低値）。これらにより薬物の半減期が著明に延長する。"},
  {id:89,difficulty:2,category:"胎児・新生児",question:"胎児循環の特徴として正しいものはどれか。",choices:{A:"胎児肺は機能しており、肺循環を通じてガス交換が行われる",B:"胎児では卵円孔（foramen ovale）と動脈管（ductus arteriosus）が存在し、肺を迂回した循環が行われる",C:"胎児の酸素供給は胎盤ではなく羊水から直接行われる",D:"胎児循環では門脈血がすべて肝臓を通過してから下大静脈に入る",E:"出生後も卵円孔は永久に開存して正常に機能する"},answer:"B",explanation:"胎児期には卵円孔（右心房と左心房の間の開口）と動脈管（肺動脈と大動脈をつなぐ短絡路）が存在し、酸素化されていない胎児の肺を迂回した循環が行われる。また静脈管（ductus venosus）により臍静脈血が肝臓を迂回して直接下大静脈に流入する。出生後、肺呼吸開始とともに肺血流が増加し、卵円孔・動脈管・静脈管はそれぞれ閉鎖する。"},
  {id:90,difficulty:2,category:"胎児・新生児",question:"新生児薬物離脱症候群（NAS: Neonatal Abstinence Syndrome）について正しいものはどれか。",choices:{A:"NASはアルコールにのみ起こり、麻薬・向精神薬では生じない",B:"妊娠中の母体のオピオイド・ベンゾジアゼピン・SSRIなどへの曝露により新生児に離脱症状が生じることがある",C:"NASの症状は出生直後から48時間以内に必ず消失する",D:"NASはすべての場合に薬物療法が必要である",E:"妊娠中の抗うつ薬（SSRI）使用でNASは生じない"},answer:"B",explanation:"NASはオピオイド（ヘロイン・メサドン・コデイン等）、ベンゾジアゼピン、バルビツレート、SSRIなど母体が使用した精神作用物質が胎盤を通過し、出生後に薬物供給が断たれることで新生児に離脱症状が現れる。主症状は高音の啼泣・振戦・過敏性・嘔吐・下痢・発汗など。SSRIによる新生児遷延性肺高血圧（PPHN）リスクも報告されている。"},
  {id:91,difficulty:2,category:"胎児・新生児",question:"新生児の血液脳関門（BBB）の特徴として正しいものはどれか。",choices:{A:"新生児のBBBは成人より成熟しており、薬物が脳内に移行しにくい",B:"新生児はBBBが未発達で、成人より薬物や物質が脳内に移行しやすい",C:"新生児のBBBは生後1週以内に成人と同等の機能に達する",D:"BBBの成熟度は中枢神経系薬物の安全性評価に影響しない",E:"新生児ではビリルビンはBBBを通過しない"},answer:"B",explanation:"新生児はBBBが未成熟であり、成人では脳内に移行しにくい物質（ビリルビン・一部の薬物等）が脳内に移行しやすい。特に非抱合型ビリルビンが核黄疸（kernicterus）を引き起こすことがある。モルヒネ・ベンゾジアゼピンなど中枢神経系作用薬は新生児でより強い中枢抑制をもたらす可能性がある。"},
  {id:92,difficulty:2,category:"胎児・新生児",question:"新生児に対してビタミンK2シロップ（またはビタミンK注射）が投与される理由として正しいものはどれか。",choices:{A:"新生児は腸内細菌によるビタミンK産生が十分でなく、凝固因子（II・VII・IX・X）が低値で出血リスクがあるため",B:"新生児の骨形成を促進するため",C:"新生児の免疫能を高めるため",D:"母乳中にビタミンKが過剰に含まれるため中和する必要があるため",E:"新生児黄疸の治療として投与する"},answer:"A",explanation:"新生児は①胎盤移行量が少ない②腸内細菌叢が未熟でビタミンK産生が低い③母乳中ビタミンK含量が少ない（人工乳には添加）などの理由でビタミンK欠乏に陥りやすく、ビタミンK依存性凝固因子（II・VII・IX・X）が低値となる。ビタミンK欠乏性出血症（頭蓋内出血等）予防のため、生後24時間以内・生後1週・生後1ヶ月にビタミンK2シロップを投与する（または出生時にK2注射）。"},
  {id:93,difficulty:2,category:"胎児・新生児",question:"胎児の薬物タンパク結合の特徴として正しいものはどれか。",choices:{A:"胎児血中アルブミン濃度は成人と同等であり、タンパク結合率は変わらない",B:"胎児は血清アルブミン・α1酸性糖タンパク（AGP）が低値であり、薬物の遊離型分率が成人より高い傾向がある",C:"胎児血中の薬物は全て母体と同じタンパク結合率を示す",D:"胎児のタンパク結合能は妊娠早期には高く、後期に低下する",E:"タンパク結合率が高い薬物（＞90%）は胎盤を通過しない"},answer:"B",explanation:"胎児血中アルブミン濃度は妊娠後半に増加するが、初期〜中期は低値。α1酸性糖タンパク（AGP）も低値。そのため遊離型薬物分率が高く、薬物感受性が成人より高い可能性がある。タンパク結合率が高くても、分子量小・脂溶性高・非イオン化型の薬物は胎盤を通過する（例：ワルファリン、フェニトイン）。"}
