  {id:94,difficulty:3,category:"合併疾患",question:"妊娠高血圧症候群（HDP）の治療として、妊娠中に第一選択薬として使用される降圧薬はどれか。",choices:{A:"ACE阻害薬（エナラプリル等）",B:"ARB（カンデサルタン等）",C:"メチルドパまたはニフェジピン（徐放性）",D:"スピロノラクトン",E:"利尿薬（フロセミド）"},answer:"C",explanation:"妊娠中の高血圧治療ではACE阻害薬・ARBは胎児腎発育障害・羊水過少・腎不全を引き起こすため禁忌。第一選択はメチルドパ（長年の安全データあり）またはニフェジピン徐放錠。ヒドララジン（静注）は重症HDP急性期に用いる。スピロノラクトンは抗アンドロゲン作用があるため禁忌。利尿薬は循環血液量をさらに減少させ胎盤血流を悪化させる可能性があり原則避ける。"},
  {id:95,difficulty:3,category:"合併疾患",question:"妊娠合併てんかんの管理において、最も催奇形性リスクが高いとされる抗てんかん薬はどれか。",choices:{A:"ラモトリギン",B:"レベチラセタム",C:"バルプロ酸ナトリウム",D:"カルバマゼピン",E:"クロナゼパム"},answer:"C",explanation:"バルプロ酸は抗てんかん薬の中で最も催奇形リスクが高く、神経管閉鎖障害（二分脊椎：リスク1〜2%）、心疾患、顔面奇形、発達障害などを引き起こす。また葉酸拮抗作用があるため高用量葉酸補充が必要。可能な限り妊娠前に他剤への切り替えを検討する。ラモトリギン・レベチラセタムは比較的催奇形リスクが低いとされる。ただしラモトリギンは妊娠中クリアランスが著明に増大するため投与量調整が必要。"},
  {id:96,difficulty:3,category:"合併疾患",question:"妊娠合併甲状腺機能亢進症（バセドウ病）の治療として正しいものはどれか。",choices:{A:"妊娠中は甲状腺機能亢進症の治療薬はすべて使用禁忌である",B:"プロピルチオウラシル（PTU）は妊娠初期に、メチマゾール（MMI）は妊娠中期以降に使用することが推奨される",C:"メチマゾールは妊娠全期間を通じて最も安全な第一選択薬である",D:"放射性ヨウ素（アイソトープ）治療は妊娠中でも安全に使用できる",E:"甲状腺機能亢進症は妊娠中に自然寛解するため治療不要なことが多い"},answer:"B",explanation:"メチマゾール（MMI）は妊娠初期に頭皮欠損（aplasia cutis）・MMI関連胎芽症（食道・気管閉鎖等）のリスクがあるため、妊娠初期はPTUを優先する。妊娠中期以降はPTUの肝毒性リスクからMMIへの切り替えを検討する。放射性ヨウ素は胎児甲状腺に移行するため妊娠中は絶対禁忌。妊娠後半は免疫寛容により病状が改善することもあるが、管理が必要。"},
  {id:97,difficulty:3,category:"合併疾患",question:"妊娠中うつ病に対するSSRI使用について正しいものはどれか。",choices:{A:"すべてのSSRIは妊娠中に絶対禁忌であり使用してはならない",B:"SSRIは妊娠初期の使用により心臓中隔欠損リスクの上昇が報告されているが、治療を要するうつ病では母体リスク（未治療うつ病）との比較においてリスクベネフィットを評価して使用可能",C:"SSRIは胎盤を通過しないため胎児への影響は全くない",D:"妊娠判明後はすべての抗うつ薬を即時中止すべきである",E:"パロキセチンはすべてのSSRIの中で妊娠中最も安全性が高い"},answer:"B",explanation:"SSRI（特にパロキセチン）は妊娠初期の使用で心臓中隔欠損・持続性肺高血圧（PPHN）のリスク上昇が報告されている。ただし未治療の重症うつ病自体も母体・胎児に重大なリスク（自殺企図・早産・低出生体重等）をもたらすため、リスクベネフィット評価のうえで継続使用を選択する場合がある。パロキセチンは妊娠中に特に注意が必要な薬剤である。急な中止は離脱症状のリスクがあり、医師と相談が必要。"},
  {id:98,difficulty:3,category:"合併疾患",question:"切迫早産に対する子宮収縮抑制薬（子宮弛緩薬）として最もよく使用されるのはどれか。",choices:{A:"オキシトシン",B:"ジノプロスト（PGF2α）",C:"塩酸リトドリン（β2刺激薬）",D:"インドメタシン",E:"ジゴキシン"},answer:"C",explanation:"切迫早産の第一選択薬はβ2アドレナリン受容体刺激薬の塩酸リトドリンで、子宮平滑筋を弛緩させて収縮を抑制する。副作用として頻脈・動悸・低カリウム血症がある。オキシトシン・ジノプロストはむしろ子宮収縮促進薬。インドメタシン（COX阻害薬）も子宮収縮抑制効果があるが動脈管早期閉鎖リスクから妊娠32週以降は原則使用しない。"},
  {id:99,difficulty:3,category:"合併疾患",question:"妊娠糖尿病（GDM）または糖尿病合併妊娠の管理において正しいものはどれか。",choices:{A:"妊娠中はスルホニルウレア系薬（グリベンクラミド等）が第一選択である",B:"食事療法・運動療法で血糖管理が不十分な場合にはインスリン療法を行う",C:"メトホルミンは妊娠中に最も安全性が確認されており広く推奨される",D:"妊娠中は血糖値が多少高くても胎児への影響はない",E:"DPP-4阻害薬は妊娠中の安全性が十分確立している"},answer:"B",explanation:"妊娠中の血糖管理は食事療法・運動療法が基本。それで不十分な場合はインスリン療法（ヒトインスリン・インスリンアナログ）を行う。スルホニルウレア系薬は胎盤通過・新生児低血糖リスクから日本では原則禁忌。メトホルミンも胎盤通過するが一部の国で使用されており、安全性データは蓄積中。DPP-4阻害薬・GLP-1受容体作動薬は妊娠中の安全性未確立で使用しない。未治療の高血糖は胎児の過剰発育・巨大児・周産期合併症のリスクを高める。"},
  {id:100,difficulty:3,category:"合併疾患",question:"妊娠中の喘息管理について正しいものはどれか。",choices:{A:"妊娠中はすべての喘息治療薬が禁忌のため吸入薬のみ使用可能",B:"妊娠中の喘息はコントロールが不良な場合、胎児低酸素症・早産・低出生体重のリスクがあるため、適切な薬物療法を継続することが重要",C:"吸入ステロイドは全身に作用するため妊娠中は使用禁忌である",D:"β2刺激薬（サルブタモール等）は妊娠中には効果がなく使用しない",E:"妊娠中の喘息悪化にはシステムステロイドのみが有効である"},answer:"B",explanation:"妊娠中の喘息コントロール不良は母体・胎児両方のリスクとなる。吸入ステロイド（ブデソニド等）は妊娠中も安全性が高く、コントロールに必要な場合は継続使用する（吸入は全身曝露が少ない）。短時間作用型β2刺激薬（SABA：サルブタモール）は発作時に使用可能。長時間作用型β2刺激薬（LABA）も吸入ステロイドとの併用で使用される。全身ステロイドは重症発作には使用可能だが長期使用は避ける。"},
  {id:101,difficulty:3,category:"合併疾患",question:"妊娠中のリウマチ（関節リウマチ）の病態として特徴的なのはどれか。",choices:{A:"妊娠中は関節リウマチの活動性が一貫して増悪する",B:"妊娠中（特に中期以降）は免疫寛容が生じてリウマチ活動性が改善することが多く、産後に再燃する傾向がある",C:"妊娠中のリウマチに対してメトトレキサートは安全に使用できる",D:"TNF-α阻害薬はすべて妊娠初期に使用禁忌である",E:"妊娠中のリウマチは治療不要で自然に完全寛解する"},answer:"B",explanation:"関節リウマチは妊娠中（特に妊娠後半）に免疫寛容の誘導により約70〜80%の患者で活動性が改善するとされる。産後は免疫が再活性化して再燃することが多い。メトトレキサートは催奇形性・流産リスクがあり妊娠中は禁忌（妊娠3ヶ月以上前に中止）。TNF-α阻害薬（エタネルセプト・アダリムマブ等）は妊娠初期〜中期は比較的安全とされるが、妊娠後期は胎盤通過量が増加するため中止時期を検討する。"},
  {id:102,difficulty:3,category:"合併疾患",question:"妊娠悪阻（hyperemesis gravidarum）の管理において正しいものはどれか。",choices:{A:"妊娠悪阻では嘔吐が続いても絶食は禁忌である",B:"ジクレクチン（ドキシラミン＋ビタミンB6）は妊娠悪阻の治療薬として使用される",C:"妊娠悪阻に制吐薬は効果がなく使用しない",D:"妊娠悪阻は妊娠20週以降に最も多く発症する",E:"妊娠悪阻でビタミンB1（チアミン）欠乏が生じることはない"},answer:"B",explanation:"ジクレクチン（ドキシラミン＋ピリドキシン配合薬）は妊娠悪阻の治療薬として妊娠中の安全性データが多く、第一選択に位置づけられる国が多い（日本ではジクレクチンを2023年承認）。重症例ではメトクロプラミド・オンダンセトロンなど制吐薬も使用される。妊娠悪阻は妊娠初期（5〜10週）に最多。重症の嘔吐が持続する場合は脱水・ウェルニッケ脳症（チアミン欠乏）に注意し、ビタミンB1補充を行う。"},
  {id:103,difficulty:3,category:"合併疾患",question:"妊娠中の統合失調症治療について正しいものはどれか。",choices:{A:"すべての抗精神病薬は妊娠中に絶対禁忌である",B:"妊娠中に抗精神病薬を急に中止すると精神症状が再燃し、母体・胎児双方に深刻なリスクをもたらす可能性があるため、専門医と連携してリスクベネフィットを評価する",C:"妊娠中の統合失調症には非定型抗精神病薬は使用できない",D:"クロザピンは妊娠中に安全性が最も確立された薬剤である",E:"抗精神病薬はすべて胎盤を通過しないため胎児への影響はない"},answer:"B",explanation:"統合失調症の薬物療法を妊娠中に突然中止すると重篤な精神症状再燃・自傷他害リスクが生じる。治療継続が必要な場合は最低有効量で継続し、精神科専門医・産科との連携が必須。抗精神病薬（ハロペリドール・リスペリドン等）は催奇形リスクは低いが、新生児薬物離脱症状・錐体外路症状に注意。クロザピンは農粒球減少リスクから妊娠中使用は慎重。"},
  ,
  {id:104,difficulty:2,category:"先天奇形・先天異常",question:"先天奇形の一般集団における自然発生率として最も近い値はどれか。",choices:{A:"全出生の約0.1〜0.5%",B:"全出生の約2〜3%",C:"全出生の約10〜15%",D:"全出生の約30%",E:"全出生の約50%以上"},answer:"B",explanation:"先天奇形（major birth defect）の自然発生率は全出生の約2〜3%とされ、これは薬物曝露がなくても発生するバックグラウンドリスクである。このバックグラウンドリスクの存在が、薬物の催奇形性評価を複雑にしている。薬物曝露群での奇形発生率がバックグラウンドリスクを有意に上回るかどうかを評価することが重要。"},
  {id:105,difficulty:2,category:"先天奇形・先天異常",question:"Wilson（ウィルソン）の催奇形性判定基準の要件として誤っているものはどれか。",choices:{A:"動物実験で再現性を持って奇形が誘発される",B:"曝露と奇形の間に明確な用量反応関係がある",C:"器官形成期に特定の感受性時期がある",D:"曝露が奇形の原因となる明確なメカニズムが解明されていること",E:"臨床観察および疫学研究によって奇形の発生率上昇が確認される"},answer:"D",explanation:"Wilsonの催奇形性6原理は、①感受性時期の存在、②種・系統差、③用量反応関係、④投与経路の関与、⑤胎児毒性スペクトル、⑥宿主因子の関与であり、メカニズムの完全解明は必須要件ではない。催奇形性が証明されるためには疫学データや動物実験での再現性が重視されるが、機序不明でも催奇形物質として認定される場合がある（例：サリドマイド）。"},
  {id:106,difficulty:2,category:"先天奇形・先天異常",question:"サリドマイドが催奇形物質として歴史的に重要な理由として正しいものはどれか。",choices:{A:"被曝した全ての胎児に同一の奇形が生じた",B:"世界で初めて市販薬の催奇形性が公式に認められ、薬剤安全性監視（ファーマコビジランス）強化のきっかけとなった",C:"ラット動物実験でも同様の催奇形性が再現された",D:"サリドマイドは現在でも完全禁止となっており医薬品として使用されていない",E:"サリドマイド被害は日本のみで発生した"},answer:"B",explanation:"サリドマイドは1950年代後半に妊娠悪阻の治療薬として使用されたが、アザラシ肢症（海豹肢：四肢短縮）などの重篤な奇形を世界で約1万人の新生児にもたらした。この事件を機にFDA規制強化・各国での薬剤安全性監視制度の整備が進んだ。なお、サリドマイドはラット等では催奖形性が再現されにくい種差があり評価を困難にした。現在はサリドマイドは厳格な管理下でハンセン病・多発性骨髄腫の治療薬として使用されている（THALIDOMIDE CELGENE等）。"},
  {id:107,difficulty:2,category:"先天奇形・先天異常",question:"バルプロ酸の催奇形性として特に重要なのはどれか。",choices:{A:"四肢短縮（アザラシ肢症）",B:"神経管閉鎖障害（二分脊椎・無脳症）および発達障害（IQ低下・自閉症スペクトラム）リスクの増加",C:"口唇口蓋裂のみのリスク増加",D:"心臓奇形のみのリスク増加",E:"外耳奇形（小耳症）のリスク増加"},answer:"B",explanation:"バルプロ酸の主な胎児リスクは①神経管閉鎖障害（二分脊椎リスク約1〜2%、通常の10倍以上）②顔面奇形・心臓奇形・四肢奇形を含むバルプロ酸症候群③発達障害（IQ低下・言語発達遅延・自閉スペクトラム症）。特に神経管閉鎖障害予防に高用量葉酸（5mg/日）補充が推奨される。EUでは生殖可能年齢の女性への処方に厳格な制限が設けられている。"},
  {id:108,difficulty:2,category:"先天奇形・先天異常",question:"妊娠中のACE阻害薬使用で特に懸念される胎児への影響はどれか。",choices:{A:"神経管閉鎖障害",B:"妊娠中期〜後期の曝露による胎児腎機能障害・羊水過少・頭蓋骨低形成・肺低形成",C:"四肢短縮",D:"口唇口蓋裂",E:"心臓中隔欠損"},answer:"B",explanation:"ACE阻害薬・ARBは妊娠中期〜後期に使用すると、胎盤のRAS（レニン・アンジオテンシン系）阻害により胎児の腎血流が低下し、羊水過少（無尿）・胎児腎不全・頭蓋骨低形成・肺低形成（Potter連鎖）を引き起こす。妊娠初期の曝露については心臓奇形リスク上昇の報告もある。したがってACE阻害薬・ARBは妊娠中（特に中期・後期）は禁忌。"},
  {id:109,difficulty:2,category:"先天奇形・先天異常",question:"妊娠中のワルファリン使用について正しいものはどれか。",choices:{A:"ワルファリンは分子量が大きいため胎盤をほとんど通過しない",B:"妊娠初期（6〜12週）のワルファリン曝露は胎児性ワルファリン症候群（鼻形成不全・骨端の石灰化等）のリスクがある",C:"ワルファリンは妊娠全期間を通じて安全に使用できる抗凝固薬である",D:"ワルファリンの催奇形性はビタミンK投与で完全に予防できる",E:"低分子ヘパリンもワルファリンと同等の催奇形性リスクがある"},answer:"B",explanation:"ワルファリンは低分子量（330Da）で脂溶性が高く胎盤を容易に通過する。妊娠6〜12週の曝露では胎児性ワルファリン症候群（鼻骨・点状軟骨石灰化・発育遅延）を引き起こす。妊娠後期の曝露では胎児・新生児出血のリスクがある。そのため分娩前後はヘパリンへの切り替えが推奨される。低分子ヘパリン（LMWH）は分子量が大きく胎盤を通過しないため妊娠中の抗凝固療法の標準的選択肢。"},
  {id:110,difficulty:2,category:"先天奇形・先天異常",question:"メトトレキサート（MTX）の催奇形性について正しいものはどれか。",choices:{A:"メトトレキサートは葉酸の構造類似体であり、葉酸代謝を阻害して神経管閉鎖障害・頭蓋奇形・四肢奇形などを引き起こす",B:"メトトレキサートは分子量が大きいため胎盤を通過しない",C:"メトトレキサートの催奇形性は投与後1週間で消失するため、1週後に妊娠しても問題ない",D:"メトトレキサートの催奇形性は動物実験では確認されたが人での報告はない",E:"メトトレキサートは少量であれば妊娠初期に使用可能である"},answer:"A",explanation:"メトトレキサートはジヒドロ葉酸還元酵素阻害薬として葉酸代謝を強力に阻害し、催奇形性（MTX胎芽症：頭蓋・四肢・顔面奇形）を引き起こす。妊娠前少なくとも3ヶ月（一般的には3〜6ヶ月）前の中止が推奨される。投与終了後も組織に蓄積するため即時妊娠は危険。リウマチ・乾癬・異所性妊娠等で使用される場合は事前の妊娠の除外と避妊指導が必須。"}
  ,
  {id:111,difficulty:2,category:"先天奇形・先天異常",question:"先天奇形の発生要因として現在支持されている考え方として最も適切なものはどれか。",choices:{A:"先天奇形はすべて遺伝的要因によって決まる",B:"先天奇形はすべて薬物・化学物質などの環境要因によって引き起こされる",C:"先天奇形の多くは遺伝的素因と環境因子（薬物・感染・放射線等）の相互作用による多因子性であると考えられている",D:"先天奇形の原因は現代医学では完全に解明されている",E:"先天奇形のうち50%以上が薬物によって引き起こされる"},answer:"C",explanation:"先天奇形の発生要因の内訳は概ね、遺伝的要因（染色体異常含む）約25%、環境因子（薬物・感染・放射線等）約10%、多因子性（遺伝と環境の相互作用）約65%とされ（確定割合は報告により異なる）、原因不明のものも多い。薬物による奇形は全先天奇形の約1〜5%と推定される。バックグラウンドリスク（自然発生率2〜3%）の理解が、薬剤の催奇形性評価に不可欠。"}
  ,
  {id:112,difficulty:3,category:"臨床研究・非臨床試験",question:"妊婦を対象とした無作為化比較試験（RCT）が少ない主な理由として正しいものはどれか。",choices:{A:"妊婦は薬物への感受性が低いため試験の有益性がないから",B:"倫理的問題（胎児への潜在的リスク）・インフォームドコンセントの困難性・法規制・製薬企業のリスク回避等により、妊婦を含む臨床試験が極めて少ない",C:"妊婦は薬物吸収能が低く正確なデータが得られないから",D:"妊婦は試験参加を希望しないから",E:"妊婦でのRCTは国際的に法律で全面禁止されているから"},answer:"B",explanation:"妊婦は歴史的に臨床試験から除外されてきた「治療的孤児（therapeutic orphan）」とも呼ばれる集団。主な理由は①胎児への未知リスク（催奇形性等）に関する倫理的問題、②インフォームドコンセントの複雑性、③訴訟リスク回避、④試験デザインの困難性。そのため妊婦への薬物使用データの多くは症例報告・レジストリ・疫学研究等の観察データに依存している。"},
  {id:113,difficulty:3,category:"臨床研究・非臨床試験",question:"妊婦への薬物安全性情報を収集する方法として「妊娠レジストリ（Pregnancy Registry）」の特徴はどれか。",choices:{A:"無作為割り付けを行うため交絡バイアスが完全に除去できる",B:"妊娠中に特定薬物を使用した女性を前向きに追跡し、妊娠転帰（奇形発生率等）を収集する前向きコホート型の安全性監視システム",C:"症例報告と同義であり、個々の症例のみを記録する",D:"動物実験に基づくデータを収集するシステムである",E:"薬物使用なしの対照群を持たないため転帰の評価はできない"},answer:"B",explanation:"妊娠レジストリは特定薬剤（抗てんかん薬・生物学的製剤等）の妊娠中使用者を前向きに登録し、奇形発生率・妊娠転帰を一般集団との比較で評価する観察研究。北米抗てんかん薬妊娠レジストリ（NAAED）等が有名。RCTのような無作為割り付けはないが、前向き設計により選択バイアスを軽減する。対照群（薬物未使用者）との比較が行われる。"},
  {id:114,difficulty:3,category:"臨床研究・非臨床試験",question:"症例対照研究（case-control study）において妊婦への薬物催奇形性を評価する際の限界として正しいものはどれか。",choices:{A:"症例対照研究は大規模なサンプルが必要でコストが高すぎて実施不可能",B:"回想バイアス（recall bias）：奇形児を持つ母親は薬物曝露を詳細に記憶しやすい一方、正常児を持つ対照群は記憶が不正確なため、曝露率が過大評価されやすい",C:"症例対照研究では因果関係を直接証明できないが偽陰性が多い",D:"症例対照研究ではすべての交絡因子を完全に制御できる",E:"症例対照研究は前向き研究より信頼性が高い"},answer:"B",explanation:"症例対照研究での催奇形性評価では、回想バイアス（recall bias）が最大の問題。奇形を持つ児の母親は妊娠中の薬物・化学物質曝露を詳細に思い出そうとする傾向があり、対照群（正常児の母）は漫然とした記憶になるため、見かけ上の曝露率の差が生まれる。また既存の診断バイアス・選択バイアス・交絡因子の制御も困難。コホート研究より後向き設計であるため信頼性は劣る面がある。"},
  {id:115,difficulty:3,category:"臨床研究・非臨床試験",question:"ICH S5（医薬品の生殖発生毒性試験ガイドライン）におけるStudy Stage（試験段階）の分類として正しいものはどれか。",choices:{A:"Segment I: 発がん性試験、Segment II: 反復毒性試験、Segment III: 単回毒性試験",B:"ICH S5では試験をStage A〜Fの6段階に分類し、受精から成熟まで評価する",C:"旧ICH S5A/SBではSegment I（受胎能・着床前後）・Segment II（器官形成期：胚胎児毒性）・Segment III（周産期・授乳期）の3段階で評価する",D:"生殖発生毒性試験はラットのみで実施すれば十分である",E:"Segment IIは親動物の雄のみを対象として評価する"},answer:"C",explanation:"旧ICH S5A/B（現在はICH S5 R3で統合）の生殖発生毒性試験は、Segment I（受胎能及び初期胚発生：雄雌生殖機能・着床・胚発生）、Segment II（胚胎児発生毒性試験：器官形成期の催奇形性評価）、Segment III（出生前後の発生及び母体機能：分娩・哺育・F1世代発育評価）の3段階。通常ラット＋ウサギ（または非ヒト霊長類）の2種で実施。"},
  {id:116,difficulty:3,category:"臨床研究・非臨床試験",question:"薬物の催奇形性に関する動物実験結果をヒトに外挿する際の問題点として最も重要なのはどれか。",choices:{A:"動物実験は高コストであること",B:"動物種間での薬物代謝・胎盤構造・感受性時期の差異が大きく、動物実験結果がヒトに必ずしも当てはまらない（種差の問題）",C:"動物実験ではSegment IIのみが実施できず情報が不十分",D:"動物実験の結果は規制当局に認められていない",E:"動物実験ではランダム割り付けができない"},answer:"B",explanation:"種差は催奇形性評価の最大の課題の一つ。例えばサリドマイドはヒト・ウサギ・一部の霊長類では催奇形性を示すが、ラット・マウスでは現れにくい（用量・代謝が異なるため）。逆に動物で催奇形性を示した薬物がヒトでは問題ないケースもある。胎盤の構造（血絨毛性・血内皮性等）も種間で異なり、薬物移行性に影響する。"},
  {id:117,difficulty:3,category:"臨床研究・非臨床試験",question:"妊婦・授乳婦への薬物安全性情報のデータベースとして最も広く利用されている文献・データベースはどれか。",choices:{A:"添付文書のみを参照すれば最新の安全性情報が得られる",B:"LactMed（米国NLM）・Hale's Medications and Mothers' Milk・REPROTOX・TERIS・Motherisk等の専門データベースが妊婦・授乳婦の薬剤評価に用いられる",C:"教科書（薬理学テキスト）の記載が最も信頼性が高い",D:"添付文書に「禁忌」と記載されているすべての薬物は実際に臨床データでの有害性が証明されている",E:"メーカー提供情報（市販後調査）のみで安全性評価が可能"},answer:"B",explanation:"妊婦・授乳婦への薬物安全性評価には複数の専門データベース・文献を総合的に参照する。LactMedは授乳中薬剤の授乳安全性情報（RID・M/P比等）をNLMが無料公開。Hale's Medications and Mothers' Milkは授乳安全性の標準的参考書（Lactation Risk Category L1〜L5）。REPROTOX・TERISは催奇形性・生殖毒性のデータベース。添付文書の禁忌記載は安全データ不足による予防的記載も多く、それのみを根拠とした判断は不十分。"}
  ,
  {id:118,difficulty:3,category:"臨床研究・非臨床試験",question:"コホート研究（前向き）と症例対照研究（後ろ向き）の特徴の比較として正しいものはどれか。",choices:{A:"コホート研究は曝露から開始し複数のアウトカムを評価できるが、長期追跡が必要で費用・時間がかかる",B:"症例対照研究はコホート研究より常に信頼性が高い",C:"コホート研究は希少疾患の研究に最も適している",D:"症例対照研究では相対リスク（RR）を直接計算できる",E:"両研究とも交絡因子の制御は不可能である"},answer:"A",explanation:"コホート研究は曝露群・非曝露群を前向きに追跡して複数アウトカム（奇形・早産・流産等）を同時に評価でき、相対リスクを直接算出できる。ただし長期追跡が必要でコスト大。症例対照研究は既存の奇形症例から後ろ向きに曝露を評価するため迅速・安価で希少疾患に向くが、回想バイアス等の問題があり、オッズ比（OR）を算出する（RRの近似値として使用）。"}
  ,
  {id:119,difficulty:1,category:"栄養・嗜好品",question:"妊娠を計画している女性、および妊娠初期の女性に推奨される葉酸補充量として正しいものはどれか。",choices:{A:"妊娠が確認されてから葉酸400μg/日を摂取開始すれば十分である",B:"妊娠の少なくとも1ヶ月前（理想的には3ヶ月前）から妊娠12週まで、食事に加えてサプリメントで葉酸400μg/日を補充する",C:"葉酸は食事からの摂取のみで十分であり、サプリメント補充は不要",D:"葉酸は妊娠後期（28週以降）からの補充が最も重要",E:"バルプロ酸を服用中の妊婦にも通常量（400μg/日）の葉酸で十分である"},answer:"B",explanation:"神経管閉鎖（閉鎖）は受精後約28日（多くの女性が妊娠に気づく前）に完了するため、妊娠前からの葉酸補充が必要。WHO・各国ガイドラインで妊娠計画段階（少なくとも1ヶ月前）から妊娠12週まで400μg/日の葉酸サプリメント補充を推奨（NTD発症リスクを50〜70%低減）。バルプロ酸・メトトレキサート等の葉酸拮抗薬を服用中の場合は高用量（4〜5mg/日）が推奨される。"},
  {id:120,difficulty:1,category:"栄養・嗜好品",question:"妊娠中の鉄需要増大について正しいものはどれか。",choices:{A:"妊娠中の鉄必要量は非妊娠時と変わらない",B:"妊娠中は胎児・胎盤への鉄供給・循環血液量増大により鉄需要が増大し、特に妊娠中期〜後期に鉄欠乏性貧血が生じやすい",C:"妊娠中の鉄欠乏性貧血は胎児への影響がなく母体のみに影響する",D:"すべての妊婦に妊娠早期から高用量鉄剤の投与が必須である",E:"鉄剤の経口補充はすべての妊婦に副作用がないため積極的に行う"},answer:"B",explanation:"妊娠中は母体循環血液量増大・胎児・胎盤への鉄供給のため鉄需要が非妊娠時の約2〜3倍に増加。特に妊娠中期〜後期に鉄欠乏性貧血が生じやすい。母体の貧血は胎児低酸素・早産・低出生体重のリスクと関連。診断には血清フェリチン・ヘモグロビン・血清鉄等を用いる。鉄剤（硫酸第一鉄等）の経口投与が基本だが、便秘・悪心等の副作用があるため用量調整が必要な場合がある。"},
  {id:121,difficulty:1,category:"栄養・嗜好品",question:"妊娠中のアルコール摂取がもたらす胎児影響として正しいものはどれか。",choices:{A:"妊娠中の少量アルコール摂取（週1〜2杯程度）は胎児への影響がないことが確立している",B:"アルコールは胎盤を通過して胎児血中濃度が母体と同程度になり、胎児性アルコールスペクトラム障害（FASD）の原因となる。安全な摂取量は存在しない",C:"アルコールの催奇形性は妊娠後期のみに生じる",D:"ビールの場合はワインより安全であり少量なら妊娠中でも問題ない",E:"アルコールは分子量が大きいため胎盤を通過しない"},answer:"B",explanation:"エタノールは低分子（MW=46）で脂溶性が高く胎盤を容易に通過し、胎児の血中濃度は母体と同等になる。胎児はアルコール代謝能が低い（ADH活性低）ため胎児体内に長時間残存する。FASDs（胎児性アルコールスペクトラム障害）は顔貌奇形・成長障害・神経発達障害（知的障害・学習困難）を含む。「安全なアルコール摂取量は存在しない」が世界的コンセンサスであり、妊娠中の飲酒は完全に避けることが推奨される。"},
  {id:122,difficulty:1,category:"栄養・嗜好品",question:"妊娠中の喫煙（タバコ）が胎児・新生児に与える影響として正しいものはどれか。",choices:{A:"妊娠中の喫煙は胎児奇形（形態異常）の主要原因であるが早産は引き起こさない",B:"ニコチン・一酸化炭素による胎盤血流低下・胎児低酸素をもたらし、低出生体重・早産・周産期死亡・乳幼児突然死症候群（SIDS）のリスクが上昇する",C:"妊娠中の受動喫煙には胎児への影響はない",D:"妊娠後期にのみ喫煙の影響があり、妊娠初期の喫煙は問題ない",E:"電子タバコ（ENDS）は妊娠中に安全であることが証明されている"},answer:"B",explanation:"タバコのニコチンは血管収縮・胎盤血流低下を引き起こし、一酸化炭素は胎児ヘモグロビンのO2運搬能を低下させる。その結果、子宮内発育遅滞（IUGR）・低出生体重（LBW）・早産・胎盤早期剥離・SIDS リスク増加が生じる。禁煙サポートが妊娠中に最も重要な介入の一つ。受動喫煙も同様のリスクがある。電子タバコも妊娠中の安全性は確立されていない。"},
  {id:123,difficulty:1,category:"栄養・嗜好品",question:"妊娠中のビタミンA（レチノール）過剰摂取のリスクとして正しいものはどれか。",choices:{A:"ビタミンAは水溶性ビタミンのため過剰摂取しても胎児に影響しない",B:"レチノール（動物性ビタミンA）の過剰摂取（10,000IU/日以上）は催奇形性（頭部・顔面・心臓奇形等）があるため、妊娠中は上限量以内の摂取に注意が必要",C:"β-カロテン（植物性ビタミンA前駆体）も大量摂取すると催奇形性がある",D:"ビタミンA過剰はすべての妊娠期間において催奇形性を示す",E:"妊娠中はビタミンAの補充は一切禁忌である"},answer:"B",explanation:"レチノール（プレフォームドビタミンA）は脂溶性で体内に蓄積し、過剰摂取（妊娠初期に10,000IU/日以上）で催奇形性（頭部・顔面・心臓・泌尿生殖器奇形）のリスクがある。一方βカロテン（植物性食品・サプリメント）は体内でビタミンAに変換される際に調節機能があり、過剰摂取による催奇形性リスクはないとされる。妊娠中のレチノール上限は通常5,000IU/日以下が推奨。"},
  {id:124,difficulty:1,category:"栄養・嗜好品",question:"妊娠中のカフェイン摂取に関する推奨として正しいものはどれか。",choices:{A:"カフェインは分子量が大きく胎盤を通過しないため妊娠中に制限する必要はない",B:"WHO・各国ガイドラインはカフェインを1日200mg未満（コーヒー約2杯相当）に制限することを推奨している",C:"妊娠中のカフェイン摂取量と早産・流産のリスクには全く関連がない",D:"緑茶・紅茶はカフェインを含まないため無制限に摂取可能",E:"妊娠中は1日500mg以上のカフェイン摂取が胎児発育に必要とされる"},answer:"B",explanation:"カフェインは低分子（MW=194）で脂溶性があり胎盤を通過する。胎児はカフェイン代謝酵素（CYP1A2）がなく排泄できないため蓄積する。高用量カフェイン摂取は流産・低出生体重のリスク上昇と関連するとの報告があり、WHO・英国NHS等は妊娠中のカフェインを200mg/日未満に制限することを推奨。コーヒー（1杯=約100mg）2杯・紅茶（1杯=約75mg）・コーラ・チョコレートにもカフェインが含まれる。"},
  {id:125,difficulty:1,category:"栄養・嗜好品",question:"妊娠中のDHA（ドコサヘキサエン酸）・EPA（エイコサペンタエン酸）摂取の重要性として正しいものはどれか。",choices:{A:"DHAは胎児の神経系・網膜の発育に重要で、妊娠中・授乳中は必要量が増加する",B:"DHAは妊娠中の摂取が禁忌とされている",C:"魚の摂取を控えることで水銀曝露とDHA不足を同時に解決できる",D:"DHAは植物性食品から十分摂取できるため魚の摂取は不要",E:"DHA・EPAの摂取は授乳期にのみ重要で妊娠中は不要"},answer:"A",explanation:"DHA（n-3系多価不飽和脂肪酸）は胎児の脳・神経系・網膜の発育に必須。妊娠中・授乳中は母体からの供給が重要で、需要が増加する。主な供給源は魚（青魚：サバ・イワシ・サーモン等）。一方、一部の大型魚（クロマグロ・キンメダイ等）にはメチル水銀が蓄積しやすく、過剰摂取は胎児神経発達に影響する可能性がある。厚生労働省・FDAは特定魚種の摂取頻度制限とDHAを多く含む低水銀魚の推奨バランスを提示している。"}
  ,
  {id:126,difficulty:2,category:"リスク評価・コミュニケーション",question:"米国FDAが2015年に旧来のABCDX妊婦薬物安全性カテゴリーを廃止し、PLLR（Pregnancy and Lactation Labeling Rule）に移行した主な理由はどれか。",choices:{A:"ABCDXカテゴリーは使いやすすぎて医療従事者が判断を怠るようになったため",B:"ABCDXカテゴリーは単純すぎて誤解を招きやすく、個々の薬物の実際のリスク情報を正確に伝えられないため、より詳細な文章形式の情報提供に変更された",C:"ABCDX分類はコストが高いため",D:"PLLRは添付文書の量を減らすための措置である",E:"ABCDXカテゴリーは授乳安全性情報を含まなかった唯一の問題点である"},answer:"B",explanation:"旧ABCDX分類（A=安全、B=動物試験で問題なし、C=動物試験で問題あり・人データなし、D=人での有害性証拠あり、X=禁忌）は、同じカテゴリー内でも薬物によってリスクの性質・程度が大きく異なるにもかかわらず単純分類に陥りやすく医療従事者の誤解を招くと批判された。PLLRではリスク要約・臨床考察・データを文章形式で提供し、妊娠・授乳・生殖への影響を個別かつ詳細に記載することとなった。"},
  {id:127,difficulty:2,category:"リスク評価・コミュニケーション",question:"妊婦・授乳婦への薬剤使用におけるリスクベネフィット評価の基本原則として正しいものはどれか。",choices:{A:"妊婦には理由を問わず全ての薬物使用を禁忌とすべきである",B:"未治療の疾患が母体・胎児にもたらすリスクと薬物治療の潜在的リスクを比較し、総合的に判断する。治療利益が薬物リスクを上回る場合に使用を検討する",C:"リスクベネフィット評価は母体リスクのみを考慮すれば十分である",D:"動物試験で催奇形性が示された薬物はヒトでも必ず禁忌とすべきである",E:"添付文書に承認外と記載された用途での使用は妊婦において常に禁忌である"},answer:"B",explanation:"妊婦への薬剤使用の意思決定において、薬物投与のリスク（催奇形性・胎児毒性等）のみでなく、未治療のリスク（疾患進行・母体合併症・胎児への間接的影響）も考慮した総合的なリスクベネフィット評価が必要。例えば妊娠中のてんかん未治療による発作・抗凝固療法なしの血栓症・統合失調症の再燃等は重大な母体・胎児リスクとなる。「妊婦だから全て禁忌」という過剰な制限は時として有害となる。"},
  {id:128,difficulty:2,category:"リスク評価・コミュニケーション",question:"妊婦への薬剤情報提供（リスクコミュニケーション）において有効な手法として正しいものはどれか。",choices:{A:"リスクは「高い・低い」などの定性的表現のみで伝えると理解しやすい",B:"絶対リスク（例：曝露群での奇形発生率）を一般集団のバックグラウンドリスクと比較して数値で提示することで、患者が正確にリスクを理解しやすくなる",C:"リスクコミュニケーションでは医療従事者が一方的に決定し、患者の意向は考慮しない",D:"不安を与えないために潜在的リスクは患者に伝えるべきではない",E:"すべての薬物は「危険かもしれない」と伝えれば十分なリスクコミュニケーションになる"},answer:"B",explanation:"リスクコミュニケーションの原則は①正確な情報提供（数値で伝える）②バックグラウンドリスクとの比較③患者の価値観・意向を尊重した共同意思決定（SDM: Shared Decision Making）④不確実性の正直な開示。例：「バルプロ酸服用中の神経管閉鎖障害リスクは約1〜2%で、通常のバックグラウンドリスク（0.1%）の10〜20倍」のように具体的数値で伝えることが推奨される。過度な不安惹起も問題だが、情報隠蔽は患者の自律性を損なう。"},
  {id:129,difficulty:2,category:"リスク評価・コミュニケーション",question:"授乳安全性評価における相対的乳児用量（RID: Relative Infant Dose）の解釈として正しいものはどれか。",choices:{A:"RIDが高いほど授乳は安全と判断される",B:"RIDは乳児が母乳を通じて摂取する薬物量を母体の体重補正投与量に対する割合（%）で表し、一般的にRID<10%であれば授乳継続について比較的安全と評価される",C:"RIDが10%を超えた場合は必ず授乳を中止しなければならない",D:"RIDは薬物の乳汁/血漿濃度比（M/P比）と同義である",E:"RIDは薬物の胎盤通過性を示す指標である"},answer:"B",explanation:"RID（Relative Infant Dose）は[(乳汁薬物濃度(mg/L)×乳汁摂取量(L/kg/日)) / 母体投与量(mg/kg/日)] × 100(%)で計算される。乳児が母乳を通じて受ける薬物量が母体投与量の何%かを示す。Hale基準ではRID<10%を比較的安全の目安とする（ただし薬物の毒性・乳児の状態等も考慮が必要）。M/P比（乳汁/血漿濃度比）はRID計算の構成要素だが別の指標。"},
  {id:130,difficulty:2,category:"リスク評価・コミュニケーション",question:"薬剤師が妊婦・授乳婦からの薬物相談に対応する際の基本的な姿勢として適切でないのはどれか。",choices:{A:"添付文書・専門データベース（LactMed・Hale's等）を参照し、最新のエビデンスに基づいた情報を提供する",B:"患者の不安に寄り添い、必要に応じて産婦人科・専門テラトロジーセンターへの紹介を行う",C:"「妊婦には全ての薬が危険」という決めつけを避け、個々のリスクベネフィットを評価して情報提供する",D:"医師が処方した薬物は全て安全であるため、患者の不安は全て根拠のないものとして否定する",E:"母体の疾患を未治療放置した場合のリスクも含めて、総合的な情報提供を行う"},answer:"D",explanation:"医師処方であっても妊婦・授乳婦への薬物使用には常に個別のリスクベネフィット評価が必要であり、患者の不安を全否定することは適切でない。薬剤師の役割は最新のエビデンスに基づく情報提供・患者支援・他職種との連携。不明点は「わからない」と正直に伝え、専門施設（虎の門病院・成育医療研究センター等のテラトロジー相談センター）への紹介も重要な対応の一つ。"}
  ,
  {id:131,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠10週の28歳女性が頭痛を訴えて薬局を訪れた。OTC薬の選択について薬剤師として最も適切な対応はどれか。",choices:{A:"イブプロフェン含有の解熱鎮痛薬を第一選択として勧める",B:"アセトアミノフェン（カロナール等）を含む製品を選択し、必要最低限の量・期間で使用するよう説明する",C:"妊娠中の市販薬はすべて禁忌のため、何も勧めずに帰宅させる",D:"アスピリン含有の解熱鎮痛薬を勧める",E:"ロキソプロフェン含有の製品を推奨する"},answer:"B",explanation:"妊娠中の頭痛にはアセトアミノフェンが最も安全性の高い選択肢として国際的に推奨される。NSAIDs（イブプロフェン・ロキソプロフェン・アスピリン等）は妊娠後期（特に28週以降）に動脈管早期閉鎖・羊水過少のリスクがあり、妊娠初期でも安全データが十分でないため避けることが望ましい。アセトアミノフェンは通常用量・短期使用であれば妊娠全期間を通じて比較的安全。"},
  {id:132,difficulty:1,category:"臨床・実務（基礎）",question:"産後3ヶ月で完全母乳栄養中の30歳女性。花粉症の症状（鼻炎・目のかゆみ）があり、抗アレルギー薬の相談に来た。授乳中に比較的安全とされる選択肢はどれか。",choices:{A:"第一世代抗ヒスタミン薬（ジフェンヒドラミン等）を第一選択とする",B:"ロラタジン（クラリチン）やセチリジン（ジルテック）等の第二世代抗ヒスタミン薬は乳汁移行量が少なく、授乳中に比較的使用しやすい",C:"抗アレルギー薬は授乳中にすべて禁忌である",D:"ケトチフェンは授乳中の第一選択として最も安全とされる",E:"抗アレルギー薬の種類に関わらず授乳直前に服用すれば安全である"},answer:"B",explanation:"ロラタジン・セチリジン・フェキソフェナジン等の第二世代（非鎮静性）抗ヒスタミン薬は分子量が比較的大きく、乳汁移行量（RID）が低く（ロラタジンRID≒1%）、授乳中に広く使用されている。第一世代（ジフェンヒドラミン等）は乳汁移行量が多く乳児への鎮静効果・乳汁分泌抑制のリスクがあるため、授乳中は第二世代が好ましい。"},
  {id:133,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠8週の25歳女性が尿路感染症（膀胱炎）と診断された。使用可能な抗菌薬として最も適切なものはどれか。",choices:{A:"フルオロキノロン系（シプロフロキサシン）",B:"テトラサイクリン系（ドキシサイクリン）",C:"アモキシシリン（ペニシリン系）またはセファレキシン（第一世代セフェム系）",D:"ST合剤（スルファメトキサゾール・トリメトプリム）",E:"クロラムフェニコール"},answer:"C",explanation:"妊娠中の尿路感染症にはペニシリン系（アモキシシリン等）・セフェム系が比較的安全で第一選択。フルオロキノロン系は動物実験で関節軟骨への影響が懸念され妊娠中は避ける。テトラサイクリン系は骨・歯への沈着（歯の黄染等）のため妊娠4ヶ月以降禁忌。ST合剤は妊娠初期（葉酸拮抗）・後期（新生児核黄疸）での使用を避ける。クロラムフェニコールはグレイベビー症候群リスクから避ける。"},
  {id:134,difficulty:1,category:"臨床・実務（基礎）",question:"授乳中の32歳女性が「子供が生後2ヶ月で完全母乳中ですが、歯科で抗生剤（アモキシシリン）が処方されました。授乳を続けても大丈夫ですか？」と相談してきた。最も適切な回答はどれか。",choices:{A:"アモキシシリンは授乳禁忌のため直ちに授乳を中止すべき",B:"アモキシシリンは乳汁移行量が少なく（RID約1%）、乳児への影響は通常軽微。授乳継続可能だが、乳児の軟便・下痢等の腸内細菌叢への影響に注意する",C:"授乳中の抗生剤使用では必ず人工乳に切り替える",D:"アモキシシリンは乳汁中に高濃度で移行するため授乳中止が必要",E:"薬剤師には判断する権限がなく、何も伝えてはいけない"},answer:"B",explanation:"アモキシシリンのRIDは約1%（通常<10%が許容範囲の目安）で、乳汁移行量は少ない。一般的に授乳継続が可能。ただし乳児の腸内細菌叢への影響から軟便・下痢が生じる可能性があり、観察を促す。LactMedでも授乳中の使用は通常問題ないと評価されている。薬剤師はエビデンスに基づいた適切な情報提供を行う義務がある。"},
  {id:135,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠16週の31歳女性が「胃もたれ・胸焼けがひどい」と相談。OTCで購入できる制酸薬の選択について適切な情報はどれか。",choices:{A:"重曹（炭酸水素ナトリウム）は長期使用には向かないが短期の制酸には使用できる",B:"炭酸カルシウム系制酸薬・アルギン酸塩配合薬は妊娠中の胃食道逆流症状に比較的安全に使用できる",C:"H2受容体拮抗薬（ファモチジン等）は妊娠中に絶対禁忌である",D:"PPIは妊娠中に安全が最も確立されており、自己判断でも継続できる",E:"妊娠中の胃食道逆流は薬で治療してはいけない"},answer:"B",explanation:"妊娠中の胃食道逆流（GERD）はプロゲステロンによる食道下部括約筋弛緩と子宮増大が原因。炭酸カルシウム系制酸薬（カルシウム補充にもなる）・アルギン酸塩は妊娠中の安全性が高い。食事管理（少量頻回・就寝前食事回避）が基本。H2受容体拮抗薬（ファモチジン等）も妊娠中に使用されることがある（FDA旧分類B）。PPIは必要な場合に使用されるが、長期安全性データは蓄積中。"},
  {id:136,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠14週の女性が便秘の相談。適切な対応として正しいものはどれか。",choices:{A:"センノシド（刺激性下剤）を大量に使用して即効性を得る",B:"まず食物繊維増加・水分摂取・適度な運動などの生活改善を指導し、薬剤が必要な場合は安全性の高い浸透圧性下剤（酸化マグネシウム等）を選択する",C:"ピコスルファートは妊娠中に最も安全な下剤として第一選択",D:"妊娠中の便秘は薬では治療できない",E:"腸管運動を促進する薬（メトクロプラミド等）を積極的に使用する"},answer:"B",explanation:"妊娠中の便秘はプロゲステロンによる腸管運動低下・鉄剤服用・水分摂取不足等が原因。まず非薬物療法（食物繊維・水分・運動）が基本。薬物療法ではバルクフォーミング薬・浸透圧性下剤（酸化マグネシウム）が比較的安全。刺激性下剤（センノシド・ピコスルファート等）は妊娠末期に子宮収縮を引き起こす可能性があり長期大量使用は避ける。"},
  {id:137,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠前から高血圧で降圧薬を服用中の35歳女性が妊娠4週と判明した。現在服用しているのはカンデサルタン（ARB）である。薬剤師として最も重要な対応はどれか。",choices:{A:"ARBは胎児に影響しないため継続してよいと伝える",B:"ARBは妊娠中（特に中期・後期）に胎児腎障害等の深刻なリスクがあるため、至急産科医・内科医と連携してメチルドパやニフェジピン等への変更を検討するよう促す",C:"妊娠初期の4週であれば心配なく、12週まで継続してよい",D:"降圧薬は妊娠中に必要ないため自己判断で中止するよう伝える",E:"ARBを妊娠中に服用した場合は必ず妊娠を中断しなければならない"},answer:"B",explanation:"ARBは妊娠中期〜後期に使用すると胎児腎機能障害・羊水過少・頭蓋骨低形成・胎児死亡のリスクがある（禁忌）。妊娠初期についても安全性は確立されていない。妊娠判明後は速やかに安全性が確認されている降圧薬（メチルドパ・ニフェジピン・ラベタロール等）への変更が必要。薬剤師は緊急性を認識して速やかに医師との連携を促す。"},
  {id:138,difficulty:1,category:"臨床・実務（基礎）",question:"授乳中の28歳女性が「授乳中に薬を飲む場合、いつ飲めば赤ちゃんへの影響が少ないですか？」と質問した。最も適切な回答はどれか。",choices:{A:"薬を飲む前に授乳することで、次の授乳まで血中濃度が下がるため影響を減らせる場合がある",B:"就寝前に飲めばよい",C:"空腹時に飲めば乳汁移行が減る",D:"薬の服用タイミングは乳汁移行量に影響しない",E:"薬を飲んだ直後に授乳すれば最も影響が少ない"},answer:"A",explanation:"多くの薬物は服用後に血中濃度が上昇し（Tmax）、その後低下する。授乳直後に服薬することで、次の授乳時には血中濃度（≒乳汁中濃度）が低下している可能性がある。ただしこの方法はすべての薬物に有効ではなく、薬物の半減期・授乳間隔によって効果が異なる。乳汁移行量が少ない薬（RID<10%）では授乳タイミングの調整はさほど意味がないことも多い。"},
  {id:139,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠5週の女性が「妊娠に気づかずに市販の総合感冒薬（イブプロフェン・カフェイン・エフェドリン含有）を3日間服用していた」と相談。薬剤師の対応として適切なのはどれか。",choices:{A:"奇形が確実に起きているので妊娠を中断するよう強く勧める",B:"服用期間・量・薬剤内容を確認し、通常の短期使用では奇形リスクが大幅に上昇する可能性は低いことを説明しつつ、産婦人科での相談を促す",C:"イブプロフェンは妊娠初期に禁忌のため直ちに中絶を指示する",D:"問題ないと安易に断言して安心させる",E:"薬剤師は何もアドバイスできないため全て産婦人科に委ねる"},answer:"B",explanation:"妊娠5週・短期間（3日）の市販感冒薬服用では、奇形リスクが著しく高まるとは通常言えない。ただし「確実に大丈夫」とも断言できない。適切な対応は①正確な服用情報を収集②バックグラウンドリスク（自然発生率2〜3%）を含めた情報提供③産婦人科への受診を促す。「奇形が確実」「中絶が必要」などの不適切な発言は患者を傷つける。テラトロジーセンターへの紹介も有用。"},
  {id:140,difficulty:1,category:"臨床・実務（基礎）",question:"妊娠28週の女性が「足がつる（こむら返り）ので市販の芍薬甘草湯を飲んでいいですか」と相談。適切な対応はどれか。",choices:{A:"漢方薬は自然由来なので妊娠中に安全に使用できると伝える",B:"芍薬甘草湯は甘草（グリチルリチン）を含み、長期大量使用では偽アルドステロン症（低カリウム血症・高血圧）のリスクがある。こむら返りにはまずマグネシウム補給・ストレッチを勧め、薬剤使用は産婦人科医に相談することを促す",C:"すべての漢方薬は妊娠中に禁忌である",D:"足がつる場合はカルシウム剤のみが有効",E:"芍薬甘草湯はこむら返りの第一選択として問題ない"},answer:"B",explanation:"芍薬甘草湯の甘草成分（グリチルリチン）は長期大量使用で偽アルドステロン症（浮腫・高血圧・低カリウム血症）を引き起こす可能性があり、妊娠中の安全性データも限られる。こむら返りにはマグネシウム補充・ストレッチが有効とされ、まず非薬物的対応を勧める。「自然由来＝安全」は誤りであり、漢方薬でもリスクは存在する。使用する場合は産婦人科医への相談を促す。"},
  {id:141,difficulty:2,category:"臨床・実務（応用）",question:"妊娠30週、32歳女性。定期健診で血圧156/98 mmHg、尿タンパク1+、浮腫あり。妊娠高血圧腎症と診断された。産科医から降圧薬の開始が検討されている。この患者に使用すべきでない降圧薬はどれか。",choices:{A:"ニフェジピン（徐放性）",B:"ラベタロール（α・β遮断薬）",C:"エナラプリル（ACE阻害薬）",D:"メチルドパ",E:"ヒドララジン"},answer:"C",explanation:"ACE阻害薬（エナラプリル等）は妊娠中期〜後期に使用すると胎児レニン・アンジオテンシン系阻害により胎児腎機能障害・羊水過少・頭蓋骨低形成・Potter連鎖を引き起こす（禁忌）。ARBも同様に禁忌。妊娠高血圧症候群の降圧薬として使用可能なのは、ニフェジピン（Ca拮抗薬）・ラベタロール・メチルドパ・重症時はヒドララジン（静注）。"},
  {id:142,difficulty:2,category:"臨床・実務（応用）",question:"妊娠18週の28歳女性。てんかんの既往あり、現在ラモトリギン200mg/日で発作がコントロールされている。妊娠を産婦人科に報告したところ「血中濃度を測ってください」と言われた。なぜ妊娠中にラモトリギン血中濃度の測定が重要か。",choices:{A:"ラモトリギンは妊娠中に腸管吸収が低下するため",B:"妊娠中はGFR増加・代謝酵素誘導によりラモトリギンのクリアランスが著明に増大（2〜3倍）し、血中濃度が大幅に低下して発作が再発するリスクがあるため、投与量調整のために血中濃度モニタリングが必要",C:"ラモトリギンは妊娠中に蓄積して毒性が増強するため",D:"ラモトリギンは胎盤を通過しないため胎児への影響評価が必要",E:"血中濃度測定はラモトリギンには不要で他の目的で測定する"},answer:"B",explanation:"ラモトリギンは主にUGT1A4によりグルクロン酸抱合を受けるが、妊娠中はエストロゲンによるUGT誘導でクリアランスが著明に増大（妊娠初期から上昇、妊娠後期に最大2〜3倍以上）し、血中濃度が有効域以下に低下して発作再発のリスクがある。そのため妊娠中は定期的な血中濃度モニタリングと投与量増量が必要。分娩後は速やかに元の量に戻す。"},
  {id:143,difficulty:2,category:"臨床・実務（応用）",question:"産後2ヶ月の28歳女性。産後うつと診断され、精神科からエスシタロプラム（SSRI）が処方された。現在完全母乳栄養中。薬剤師の対応として適切なのはどれか。",choices:{A:"SSRIは授乳中に絶対禁忌なので直ちに人工乳に切り替えるよう指示する",B:"エスシタロプラムのRIDは約5〜8%程度で通常の許容範囲内。産後うつの治療を優先しながら授乳継続可能だが、乳児の睡眠変化・興奮性亢進・哺乳量変化等を注意深く観察するよう説明する",C:"産後うつの治療薬は授乳を必ず中止させなければならない",D:"母乳栄養は産後うつには有害なので直ちに断乳を勧める",E:"SSRIはすべて授乳中の安全性が全く確立されていない"},answer:"B",explanation:"エスシタロプラム・セルトラリン等のSSRIは比較的乳汁移行量が少ない（RID：セルトラリン約0.9%、エスシタロプラム約5〜8%）。産後うつの未治療は母子双方に深刻なリスクをもたらすため、授乳継続しながら治療を行うことが多い。Hale評価ではL2〜L3。乳児への影響（睡眠変化・哺乳量変化・体重増加等）を定期的に観察することが重要。"},
  {id:144,difficulty:2,category:"臨床・実務（応用）",question:"妊娠24週の35歳女性。橋本病（慢性甲状腺炎）による甲状腺機能低下症でレボチロキシン100μg/日を服用中。産科医から「妊娠中はレボチロキシンの必要量が増えることがある」と説明された。その理由として正しいものはどれか。",choices:{A:"妊娠中は甲状腺機能が完全に停止するため",B:"妊娠中はエストロゲン増加によるサイロキシン結合グロブリン（TBG）増加で結合型T4が増加し、さらに胎児の甲状腺機能発達に母体T4が必要なため、レボチロキシン必要量が増大する",C:"妊娠中は腸管吸収が増加してレボチロキシンの必要量が減少する",D:"胎児がレボチロキシンを直接消費するため",E:"妊娠中はTSHが低下するためレボチロキシンが不要になる"},answer:"B",explanation:"妊娠中はエストロゲン増加によりTBGが増加し、より多くのT4が結合型となって遊離T4（活性型）が相対的に低下。また妊娠初期〜中期は胎児の甲状腺が未発達のため母体T4に依存する。さらに胎盤でのT4脱ヨウ素化・腎排泄増加もある。そのため甲状腺機能低下症のレボチロキシン必要量は妊娠中に25〜50%増加することが多く、妊娠初期からTSH・fT4モニタリングと投与量調整が必要。"},
  {id:145,difficulty:2,category:"臨床・実務（応用）",question:"妊娠36週の28歳女性に切迫早産のため塩酸リトドリン注射が投与された。投与開始から6時間後に心拍数120回/分・手指振戦・低カリウム血症（K 3.1 mEq/L）が出現。この副作用の対応として正しいのはどれか。",choices:{A:"これらの症状はリトドリン投与の予測される副作用であり、全く対処の必要はない",B:"リトドリンのβ2刺激によるK細胞内移行・頻脈は予測される副作用。症状の程度に応じて投与量減量・電解質補充を検討し、心電図モニター継続が必要",C:"直ちにプロプラノロール（βブロッカー）を大量投与して拮抗する",D:"低カリウム血症はリトドリンとは無関係である",E:"頻脈はリトドリンの有効性の指標であり目標値は130回/分以上"},answer:"B",explanation:"リトドリン（β2アドレナリン受容体刺激薬）の主な副作用は①頻脈・動悸（β1刺激）②低カリウム血症（β2刺激によるK+の細胞内移行）③振戦④高血糖⑤肺水腫（重症例）。低カリウム血症は補液・カリウム補充で対応。投与量を最低有効量に調整し、心電図・電解質の定期モニタリングが必要。"},
  {id:146,difficulty:2,category:"臨床・実務（応用）",question:"妊娠20週の32歳女性。気管支喘息で吸入ステロイド（ブデソニド・フォルモテロール配合剤）を使用中。「妊娠中だから喘息の薬をやめたい」と訴えた。薬剤師の対応として最も適切なのはどれか。",choices:{A:"「妊娠中の薬はすべて危険なので中止してください」と伝える",B:"妊娠中の喘息コントロール不良（発作・低酸素血症）は胎児低酸素・早産・低出生体重のリスクとなる。吸入ステロイドは全身曝露が少なく妊娠中も安全性が認められており、自己判断中止は危険と説明し産婦人科・呼吸器科への相談を促す",C:"吸入薬は全身作用がないため無制限に使用できると伝える",D:"β2刺激薬（フォルモテロール）のみ継続してステロイドは中止するよう伝える",E:"妊娠中は喘息薬は経口薬のみに切り替えるよう指示する"},answer:"B",explanation:"妊娠中の喘息管理において、コントロール不良による母体低酸素は胎盤血流低下を引き起こし胎児に重大なリスクをもたらす。吸入ステロイド（特にブデソニド）は妊娠中の安全性データが豊富で、妊娠中でも継続使用が推奨される（吸入は全身曝露が少ない）。β2刺激薬も同様。「薬が怖い」という患者の不安に共感しながら、正確なリスクベネフィット情報を伝えることが薬剤師の重要な役割。"},
  {id:147,difficulty:2,category:"臨床・実務（応用）",question:"産後6週の30歳女性が血栓性静脈炎の治療中。ワルファリンが処方されているが授乳継続を希望している。薬剤師の情報提供として正しいのはどれか。",choices:{A:"ワルファリンは授乳中に絶対禁忌のため直ちに断乳するよう指示する",B:"ワルファリンは血漿タンパク結合率が高く（99%）乳汁移行量は非常に少ない（RID<1%）。授乳中の使用は一般的に安全とされ、授乳継続可能。乳児へのビタミンK2投与が適切に行われているか確認することが重要",C:"ワルファリンはタンパク結合率が低いため乳汁中に大量移行する",D:"授乳中の抗凝固療法には低分子ヘパリンのみが使用できる",E:"ワルファリン服用中の母親の母乳を飲んだ乳児は必ず出血する"},answer:"B",explanation:"ワルファリンは血漿タンパク結合率99%の酸性薬物で、乳汁（弱アルカリ性）への移行は極めて少ない（RID<1%）。LactMedでも授乳中の使用は安全と評価。ただし新生児は消化管からのビタミンKが少なくワルファリン感受性が高い可能性があるため、乳児へのビタミンK2投与が適切に行われていることを確認する。低分子ヘパリンも授乳中は安全（高分子のため乳汁移行せず）。"},
  {id:148,difficulty:2,category:"臨床・実務（応用）",question:"妊娠26週の28歳女性。妊娠糖尿病と診断され、食事療法・運動療法を2週間実施したが空腹時血糖110mg/dL・食後2時間血糖165mg/dLと目標未達。次のステップとして最も適切な治療はどれか。",choices:{A:"グリベンクラミド（スルホニルウレア系）を開始する",B:"インスリン療法（ヒトインスリンまたはインスリンアナログ）を開始する",C:"メトホルミンを第一選択として開始する",D:"DPP-4阻害薬（シタグリプチン等）を開始する",E:"食事・運動療法のみで分娩まで様子を見る"},answer:"B",explanation:"妊娠糖尿病で食事・運動療法が不十分な場合、インスリン療法が推奨される。スルホニルウレア系は胎盤通過・新生児低血糖リスクから日本では原則使用しない。メトホルミンも胎盤通過するため日本の標準治療では推奨されない。DPP-4阻害薬・GLP-1受容体作動薬は妊娠中の安全性未確立で使用しない。未治療の高血糖は胎児の過剰発育・巨大児・肩甲難産・新生児低血糖のリスクを高める。"},
  {id:149,difficulty:2,category:"臨床・実務（応用）",question:"産後1ヶ月の27歳女性。完全母乳栄養中。高血圧の再発（血圧152/96 mmHg）のため産科から降圧薬の処方を検討されている。授乳中に使用しやすい降圧薬として適切なのはどれか。",choices:{A:"エナラプリル（ACE阻害薬）は授乳中に禁忌",B:"ニフェジピン（Ca拮抗薬）やラベタロール（α・β遮断薬）は授乳中に使用可能であり、乳汁移行量が少ない",C:"授乳中はすべての降圧薬が禁忌のため断乳が必要",D:"メチルドパは授乳中に禁忌である",E:"ARBは授乳中に最も安全とされる"},answer:"B",explanation:"授乳中の降圧薬選択：ニフェジピン（RID約3%）・ラベタロール（RID約0.5%）・メチルドパは授乳中に使用可能。エナラプリルも授乳中は比較的安全とされる報告もある（乳汁移行少）。ARBは妊娠中禁忌だが授乳中については安全性データが少なく避けるべき。授乳中の高血圧は治療が重要で、適切な薬剤選択で授乳継続可能。"},
  {id:150,difficulty:2,category:"臨床・実務（応用）",question:"妊娠9週の30歳女性。関節リウマチの治療中。現在メトトレキサート（MTX）15mg/週・プレドニゾロン5mg/日を服用していたが、妊娠判明した。最も重要な対応はどれか。",choices:{A:"メトトレキサートは少量なので妊娠中も継続してよい",B:"MTXは強力な催奇形薬（葉酸代謝拮抗）で妊娠中は禁忌のため至急中止。葉酸高用量補充を開始し、産婦人科・リウマチ科と連携して代替治療（プレドニゾロン継続・生物学的製剤等）を検討する",C:"MTXは妊娠中に自然分解するため問題ない",D:"プレドニゾロンも禁忌のため即時中止する",E:"リウマチの薬はすべて中止して無治療にする"},answer:"B",explanation:"MTXはジヒドロ葉酸還元酵素阻害により催奇形性（MTX胎芽症：頭蓋・四肢・顔面奇形）・流産リスクが高く、妊娠中は禁忌。投与終了後3ヶ月以上の避妊が必要とされるほどリスクが高い。妊娠9週では器官形成期が継続中のため緊急の中止と葉酸高用量（5mg/日）補充が必要。プレドニゾロン（低用量）は妊娠中も継続可能なことが多い。リウマチ治療の継続については産婦人科・リウマチ科の連携で判断。"},
  {id:151,difficulty:3,category:"臨床・実務（実践）",question:"妊娠32週の26歳女性。てんかんでバルプロ酸ナトリウム800mg/日服用中。妊娠前から服用しており、変更はしていない。現在まで発作はなし。血中バルプロ酸濃度は75μg/mL（有効域50〜100）。この患者の管理について最も適切な対応はどれか。",choices:{A:"血中濃度が有効域内なので現状維持でよい",B:"バルプロ酸は催奇形リスクが最も高い抗てんかん薬。妊娠32週では器官形成期は過ぎているが発達毒性（IQ低下・自閉スペクトラム症）のリスクは継続。今後の管理（分娩・産後）・葉酸高用量継続・次妊娠前の薬剤変更の可能性について神経内科・産婦人科で多職種連携が必要",C:"妊娠32週は安全期なので催奇形性の心配はない",D:"すぐにバルプロ酸を中止してラモトリギンに変更する",E:"バルプロ酸は授乳中には安全なので産後の授乳は問題ない"},answer:"B",explanation:"バルプロ酸の催奇形リスクは器官形成期（妊娠初期）に最大だが、神経発達毒性（IQ低下平均約8〜10点・自閉スペクトラム症リスク増加）は妊娠全期間・授乳期を通じて懸念される。妊娠32週での急な薬剤変更は発作再発リスクが高く危険。現実的には①葉酸5mg/日継続②定期的血中濃度測定③分娩後の児の神経発達フォロー④次妊娠計画時にバルプロ酸以外の選択肢を事前に検討⑤授乳については個別判断（乳汁移行あり、RID約1〜4%）。"},
  {id:152,difficulty:3,category:"臨床・実務（実践）",question:"人工心臓弁置換術後でワルファリン（INR目標2.0〜3.0）を服用中の32歳女性が第1子を妊娠（妊娠6週）した。抗凝固療法の管理として最も適切な方針はどれか。",choices:{A:"妊娠中はすべての抗凝固薬が禁忌なので直ちに中止する",B:"妊娠6〜12週のワルファリン曝露は胎児性ワルファリン症候群リスクがある。一般には妊娠6〜12週は低分子ヘパリン（LMWH）かヘパリンへの切り替えを検討するが、機械弁の血栓リスクも高いため産婦人科・循環器科・血液内科による個別リスクベネフィット評価が必須",C:"機械弁術後はワルファリン継続が絶対的に優先されるため妊娠中も継続",D:"低分子ヘパリンは妊娠中に禁忌",E:"アスピリン（低用量）のみで抗血栓療法として十分"},answer:"B",explanation:"機械弁置換術後の抗凝固療法管理は妊娠中に最も複雑な問題の一つ。ワルファリンは妊娠6〜12週の胎児性ワルファリン症候群リスクがあるが、LMWHへの変更では血栓塞栓リスクが高まる（特に機械弁）。欧州・米国ガイドラインでも機械弁妊娠の管理は施設ごとに異なり、ワルファリン継続/LMWH切り替え/ワルファリン用量調整等を個別評価する。低分子ヘパリンは胎盤通過せず胎児には安全。多職種連携が必須。"},
  {id:153,difficulty:3,category:"臨床・実務（実践）",question:"授乳中（生後3ヶ月）の25歳女性。双極性障害でリチウム600mg/日服用中。授乳継続の可否について相談。リチウムの授乳への影響を評価する上で最も重要な点はどれか。",choices:{A:"リチウムは乳汁移行量が少ないため授乳に問題ない",B:"リチウムは乳汁移行量がSSRIより多く（RID約12〜30%）、治療域が狭い。乳児の腎機能未熟によるリチウム蓄積リスク・中毒症状（哺乳不良・振戦・チアノーゼ等）のリスクを慎重に評価し、乳児血中リチウム濃度モニタリングを行いながら授乳継続を判断する必要がある",C:"双極性障害の薬は授乳中に常に禁忌",D:"リチウムは半減期が短いため授乳への影響はすぐ消える",E:"生後3ヶ月以降は乳児の代謝能が完全に成熟している"},answer:"B",explanation:"リチウムはRIDが約12〜30%と比較的高く（一般的許容目安<10%）、治療域が狭い（血中濃度0.6〜1.2 mEq/L）。乳児は腎機能が未熟でリチウム排泄が遅いため蓄積リスクがある。脱水・発熱時はリスクが上昇。授乳継続する場合は乳児の血中リチウム濃度・腎機能モニタリング、症状観察が必須。精神科・産婦人科・小児科の連携のもとで個別判断。断乳を選択する場合もある。"},
  {id:154,difficulty:3,category:"臨床・実務（実践）",question:"妊娠28週の34歳女性。SLE（全身性エリテマトーデス）でヒドロキシクロロキン（HCQ）200mg/日を服用中。「妊娠したからHCQを止めたい」と言う。薬剤師・医師として適切な対応はどれか。",choices:{A:"妊娠中はすべての抗リウマチ薬を中止すべきなのでHCQも中止する",B:"HCQはSLEの妊娠管理に重要。妊娠中のHCQ継続はSLE再燃リスクを低下させ、流産・早産・IUGR予防にも有益とされる。催奇形性のエビデンスはなく、妊娠中も継続することが国際ガイドラインで推奨されている",C:"HCQは分子量が大きいため胎盤を通過しない",D:"HCQの代わりにメトトレキサートへ変更する",E:"HCQは授乳中のみ使用可能で妊娠中は禁忌"},answer:"B",explanation:"HCQ（ヒドロキシクロロキン）はSLE管理の基本薬。妊娠中のSLE再燃を抑制し、胎盤機能維持・流産・早産・低出生体重・新生児ループスの減少に有益。複数の大規模観察研究で催奇形性はないとされ、ACR・EULARガイドラインともに妊娠中継続を推奨。中止によるSLE再燃リスクのほうが胎児への影響よりはるかに大きい。患者の誤解を解き、正確な情報提供を行うことが重要。"},
  {id:155,difficulty:3,category:"臨床・実務（実践）",question:"妊娠中にSSRI（パロキセチン20mg/日）を服用していた母親から生まれた男児（在胎38週、正期産）。出生6時間後から高調な啼泣・振戦・哺乳力低下・多呼吸が出現。この臨床像として考慮すべきことはどれか。",choices:{A:"これは正常な新生児の生理的な状態である",B:"母体のSSRI服用による新生児遷延性症候群（NAS/新生児薬物調整症候群）の可能性。症状は出生後24〜48時間以内に出現し、通常2週間以内に改善。哺乳支援・保温・必要に応じてNICU管理が必要",C:"これはSSRIによる新生児の重篤な奇形である",D:"症状はパロキセチンの胎内蓄積によるものではなく感染症を疑う",E:"SSRIによる新生児への影響はないためこれは偶然の一致"},answer:"B",explanation:"SSRIは胎盤を通過し、出生後に薬物供給が断たれると新生児に一過性の神経適応症状（哺乳不良・振戦・高調啼泣・過活動・低体温・まれに痙攣・新生児遷延性肺高血圧PPHN）が出現することがある。症状は通常48時間以内に出現し、1〜2週間で改善。パロキセチンは半減期が長く特に症状が出やすいとされる。NICUによる支持療法が中心。妊娠後期のSSRIのtaperingは発作再燃リスクがあり推奨されない場合が多い。"},
  {id:156,difficulty:3,category:"臨床・実務（実践）",question:"オピオイド依存症の治療としてメサドン維持療法（MMT）を受けている妊娠22週の28歳女性。産婦人科から「分娩後に新生児薬物離脱症候群（NAS）が生じる予定」と説明があった。分娩後の新生児管理として最も適切なのはどれか。",choices:{A:"メサドン服用中の母親の児は必ず奇形があるため精密検査が必要",B:"NAS発症の可能性があるため、出生後少なくとも5〜7日間（MMTの場合はより長期）の新生児モニタリング（Finnegan Score等による評価）を行い、症状が重篤な場合はモルヒネや経口メサドンで管理する",C:"メサドン服用中の母親はすべて帝王切開が必要",D:"NASは予防できないため特別な管理は不要",E:"母体のメサドン投与量を出産1週前から急減させてNASを防ぐ"},answer:"B",explanation:"MMT中の妊婦から生まれる新生児はほぼ全例でNASを発症するが、適切に管理すれば重篤な転帰は防げる。症状出現時期はメサドンの長い半減期から出生後24〜72時間以降が多い。Finnegan Neonatal Abstinence Scoring（FNAS）でスコア評価し、スコアが高い場合はモルヒネ（経口）や低用量メサドンで薬物療法を行う。母体のMMT急減量はヘロイン再使用リスクを高め禁忌。母乳育児はMMT継続中でも（HIV陰性・他の禁忌なければ）奨励される場合がある。"},
  {id:157,difficulty:3,category:"臨床・実務（実践）",question:"妊娠8週の30歳女性。既往にクローン病あり、インフリキシマブ（抗TNF-α抗体）5mg/kg 8週ごとで維持療法中。妊娠継続を希望。抗TNF-α抗体の妊娠中使用について正しいのはどれか。",choices:{A:"インフリキシマブは分子量が大きいため妊娠初期は胎盤をほとんど通過せず催奇形リスクは低い。ただし妊娠後期（妊娠22〜24週以降）はFcRn受容体を介した能動輸送で胎盤通過量が増加し、生まれた児の血中に最大6ヶ月間残存することがあるため、新生児への生ワクチン接種に注意が必要",B:"インフリキシマブは妊娠全期間を通じて完全に安全である",C:"インフリキシマブは分子量が小さいため妊娠全期間を通じて大量に胎盤を通過する",D:"生物学的製剤は妊娠中すべて禁忌",E:"インフリキシマブは胎盤を通過しないため新生児への影響は全くない"},answer:"A",explanation:"インフリキシマブ（IgG1型モノクローナル抗体、分子量約150kDa）は妊娠初期〜中期は胎盤通過量が少ないが、妊娠後期はFcRn（新生児Fc受容体）を介した能動輸送で胎盤通過が増大し、新生児血中で母体より高濃度になることもある。児の血中抗体は生後6ヶ月程度持続。そのため母体がインフリキシマブを投与されていた場合、生まれた児への生ワクチン（BCG等）は生後6ヶ月以降に行う。クローン病の活動期は胎盤炎症・早産リスクがあり、寛解維持の重要性とのバランスを考慮。"},
  {id:158,difficulty:3,category:"臨床・実務（実践）",question:"妊娠20週の32歳女性。HIV感染症で抗HIV療法（ART）を継続中。テノホビル・エムトリシタビン・リルピビリン配合剤を服用。「妊娠中だから薬を止めたい」と訴えた。最も適切な対応はどれか。",choices:{A:"妊娠中の抗HIV療法は胎児に有害なので中止する",B:"妊娠中のART継続は①母体のCD4数維持・日和見感染予防②母子感染予防（ART継続で母子感染率を0.1〜1%まで低下）に必須。自己判断中止は母体・児双方に重大なリスクをもたらすため、産婦人科・感染症科と連携して安全に継続する",C:"HIV感染妊婦は必ず帝王切開で分娩するためARTは不要",D:"妊娠中はARTをジドブジン単剤に変更するのが標準治療",E:"ARTを中止して分娩後に再開すれば母子感染は防げる"},answer:"B",explanation:"妊娠中のART継続は母子感染予防の要。適切なART継続（血中ウイルス量の抑制）により、分娩時の母子感染率は0.1〜1%未満まで低下（未治療では約15〜45%）。現代のARTレジメンは多くが妊娠中の安全性データを有する。テノホビル・エムトリシタビンは妊娠中も使用可能。リルピビリンは食事との服用が必要で妊娠悪阻時に注意。自己判断中止でウイルス量が上昇すると母子感染・薬剤耐性リスクが増大。"},
  {id:159,difficulty:3,category:"臨床・実務（実践）",question:"産後5日目の28歳女性。帝王切開後で術後疼痛管理のためモルヒネ（経口徐放剤）が処方されている。完全母乳で授乳中。乳児への影響評価として最も重要な観察点はどれか。",choices:{A:"モルヒネは乳汁移行しないため観察不要",B:"モルヒネは乳汁に移行し（RID約4〜9%）、授乳された乳児に中枢神経抑制（哺乳力低下・過度な眠気・呼吸抑制）が生じる可能性がある。特に新生児は血液脳関門未発達・モルヒネ代謝能低く感受性高い。乳児の哺乳量・睡眠パターン・呼吸数・皮膚色を慎重に観察する",C:"帝王切開後のオピオイドはすべて授乳中禁忌のため断乳が必要",D:"モルヒネの乳汁移行は生後7日目以降に生じる",E:"徐放製剤は乳汁移行しない"},answer:"B",explanation:"モルヒネはRID約4〜9%で、乳汁移行量は低くはないが完全断乳を必ずしも要する程ではない。ただし新生児（生後5日目）はBBBが未熟でオピオイド感受性が高く、中枢神経抑制リスクに注意が必要。現実的には術後疼痛管理としてアセトアミノフェン・NSAID（授乳中短期は許容）を優先し、オピオイドは最低有効量・最短期間とする。乳児の哺乳力・意識レベル・呼吸状態の観察が重要。アセトアミノフェン注（パラセタモール）は授乳中の安全性が高い。"},
  {id:160,difficulty:3,category:"臨床・実務（実践）",question:"妊娠16週の30歳女性。精神科でクロザピン（非定型抗精神病薬）300mg/日を服用中。治療抵抗性統合失調症で、クロザピンにより初めて安定した。妊娠中の管理について最も重要な考慮点はどれか。",choices:{A:"クロザピンは妊娠中に安全性が最も確立された抗精神病薬",B:"クロザピンは農粒球減少症リスク（定期的血液検査が必要）に加え、妊娠中は胎児への曝露（鎮静・錐体外路症状）と精神症状再燃リスクのバランスを多職種チーム（精神科・産婦人科・薬剤師・社会福祉士）で慎重に評価し、投与継続・他剤変更・産後計画について意思決定を支援する",C:"クロザピンは農粒球減少症リスクがあるため妊娠中は直ちに中止",D:"治療抵抗性統合失調症でも妊娠中は薬物療法は不要",E:"クロザピンは分子量が大きいため胎盤を通過しない"},answer:"B",explanation:"クロザピンは治療抵抗性統合失調症に唯一有効な場合もある重要な薬剤。妊娠中の課題は①農粒球減少症モニタリング（定期血液検査の継続）②胎盤通過による新生児への影響（鎮静・錐体外路症状・NAS）③体重増加・糖尿病リスク（妊娠糖尿病との複合）④精神症状再燃リスク。急な中止は重篤な精神症状再燃を招く。催奇形性は低いとされるが妊娠中安全性データは限られる。多職種チームによる個別化された意思決定が必須。"}
];

// ===== 薬物動態カテゴリ定義 =====
const PK_CATEGORIES = ["妊娠中の薬物動態", "胎盤通過性", "母乳移行性"];

// ===== 新カテゴリグループ =====
const SECTION_CATEGORIES = {
  clinical:     ["臨床・実務（基礎）", "臨床・実務（応用）", "臨床・実務（実践）"],
  perinatal:    ["周産期医療・生理学"],
  fetal:        ["胎児・新生児"],
  complication: ["合併疾患"],
  congenital:   ["先天奇形・先天異常"],
  research:     ["臨床研究・非臨床試験"],
  nutrition:    ["栄養・嗜好品"],
  risk:         ["リスク評価・コミュニケーション"]
};

// ===== State =====
let currentList = [];
let currentIndex = 0;
let score = 0;
let userAnswers = [];
let answered = false;

// ===== カテゴリリスト構築 =====
function buildCatList() {
  const counts = {};
  quizData.forEach(q => { counts[q.category] = (counts[q.category] || 0) + 1; });
  const cats = Object.keys(counts).sort();
  const container = document.getElementById('catList');
  cats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'cat-item';
    div.innerHTML = `<span>${cat}</span><span class="cat-count">${counts[cat]}問</span>`;
    div.onclick = () => startQuiz(cat, true);
    container.appendChild(div);
  });
}

function toggleCatList() {
  const list = document.getElementById('catList');
  const arrow = document.getElementById('catArrow');
  const isOpen = list.classList.toggle('open');
  arrow.textContent = isOpen ? '∨' : '›';
}

// ===== サブボタン展開 =====
function toggleSub(subId, btn) {
  const sub = document.getElementById(subId);
  const isOpen = sub.classList.toggle('open');
  // 矢印を回転
  const arrowMap = {
    subPharma: 'arrowPharma', subPK: 'arrowPK', subAll: 'arrowAll',
    subPerinatal: 'arrowPerinatal', subFetal: 'arrowFetal',
    subComplication: 'arrowComplication', subCongenital: 'arrowCongenital',
    subResearch: 'arrowResearch', subNutrition: 'arrowNutrition', subRisk: 'arrowRisk',
    subDiffEasy: 'arrowDiffEasy', subDiffMid: 'arrowDiffMid', subDiffHard: 'arrowDiffHard',
    subClinical: 'arrowClinical'
  };
  const arrow = document.getElementById(arrowMap[subId]);
  if (arrow) arrow.textContent = isOpen ? '∨' : '›';
  btn.classList.toggle('open', isOpen);
  // 他のサブボタンを閉じる
  ['subPharma', 'subPK', 'subAll', 'subPerinatal', 'subFetal', 'subComplication', 'subCongenital', 'subResearch', 'subNutrition', 'subRisk', 'subDiffEasy', 'subDiffMid', 'subDiffHard', 'subClinical'].forEach(id => {
    if (id !== subId) {
      document.getElementById(id).classList.remove('open');
      const a = document.getElementById(arrowMap[id]);
      if (a) a.textContent = '›';
      const btnIdMap = {
        subPharma: 'btnPharma', subPK: 'btnPK', subAll: 'btnAll',
        subPerinatal: 'btnPerinatal', subFetal: 'btnFetal',
        subComplication: 'btnComplication', subCongenital: 'btnCongenital',
        subResearch: 'btnResearch', subNutrition: 'btnNutrition', subRisk: 'btnRisk',
        subDiffEasy: 'btnDiffEasy', subDiffMid: 'btnDiffMid', subDiffHard: 'btnDiffHard',
        subClinical: 'btnClinical'
      };
      const b = document.getElementById(btnIdMap[id]);
      if (b) b.classList.remove('open');
    }
  });
}

// ===== 難易度別クイズ開始 =====
function startQuizByDifficulty(diff, shuffle) {
  currentList = quizData.filter(q => q.difficulty === diff);
  if (shuffle) currentList.sort(() => Math.random() - 0.5);
  currentIndex = 0; score = 0; userAnswers = [];
  showScreen('screenQuiz');
  renderQuestion();
}

// ===== クイズ開始 =====
function startQuiz(mode, shuffle) {
  if (mode === 'all') {
    currentList = [...quizData];
  } else if (mode === 'pharma') {
    currentList = quizData.filter(q => !PK_CATEGORIES.includes(q.category));
  } else if (mode === 'pk') {
    currentList = quizData.filter(q => PK_CATEGORIES.includes(q.category));
  } else if (SECTION_CATEGORIES[mode]) {
    currentList = quizData.filter(q => SECTION_CATEGORIES[mode].includes(q.category));
  } else {
    currentList = quizData.filter(q => q.category === mode);
  }
  if (shuffle) {
    currentList.sort(() => Math.random() - 0.5);
  }
  currentIndex = 0;
  score = 0;
  userAnswers = [];
  showScreen('screenQuiz');
  renderQuestion();
}

// ===== 問題描画 =====
function renderQuestion() {
  answered = false;
  const q = currentList[currentIndex];
  const total = currentList.length;
  const pct = Math.round(((currentIndex) / total) * 100);

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('scoreText').textContent = `正解: ${score}`;
  document.getElementById('quizHeaderSub').textContent = `問${currentIndex + 1} / ${total}`;
  const diffLabel = {1:'★ 基礎', 2:'★★ 応用', 3:'★★★ 実践'};
  const diffClass = {1:'d1', 2:'d2', 3:'d3'};
  const catBadge = document.getElementById('categoryBadge');
  catBadge.innerHTML = q.category + (q.difficulty ? ' <span class="diff-badge ' + (diffClass[q.difficulty]||'d2') + '">' + (diffLabel[q.difficulty]||'') + '</span>' : '');
  document.getElementById('questionText').textContent = `Q${currentIndex + 1}. ${q.question}`;

  const choicesWrap = document.getElementById('choicesWrap');
  choicesWrap.innerHTML = '';
  ['A','B','C','D','E'].forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${key}</span><span>${q.choices[key]}</span>`;
    btn.onclick = () => selectAnswer(key, btn);
    choicesWrap.appendChild(btn);
  });

  document.getElementById('feedbackBanner').className = 'feedback-banner';
  document.getElementById('feedbackBanner').innerHTML = '';
  document.getElementById('explanationCard').className = 'explanation-card';
  document.getElementById('nextBtn').className = 'next-btn';
}

// ===== 解答処理 =====
function selectAnswer(selected, clickedBtn) {
  if (answered) return;
  answered = true;
  const q = currentList[currentIndex];
  const isCorrect = selected === q.answer;
  if (isCorrect) score++;
  userAnswers.push({ q, selected, isCorrect });

  // 全ボタン無効化 & ハイライト
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(btn => {
    btn.disabled = true;
    const label = btn.querySelector('.choice-label').textContent;
    if (label === q.answer) btn.classList.add('correct');
    else if (label === selected && !isCorrect) btn.classList.add('wrong');
  });

  // フィードバックバナー
  const fb = document.getElementById('feedbackBanner');
  if (isCorrect) {
    fb.className = 'feedback-banner correct-fb show';
    fb.innerHTML = '✅ 正解！';
  } else {
    fb.className = 'feedback-banner wrong-fb show';
    fb.innerHTML = `❌ 不正解　正解は <strong>${q.answer}</strong>`;
  }

  // 解説
  document.getElementById('explanationText').textContent = q.explanation;
  document.getElementById('explanationCard').className = 'explanation-card show';

  // スコア更新
  document.getElementById('scoreText').textContent = `正解: ${score}`;

  // 次へボタン
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.className = 'next-btn show';
  const isLast = currentIndex >= currentList.length - 1;
  nextBtn.textContent = isLast ? '結果を見る ›' : '次の問題 →';
}

// ===== 次の問題 =====
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentList.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

// ===== 結果画面 =====
function showResult() {
  showScreen('screenResult');
  window.scrollTo(0, 0);
  const total = currentList.length;
  const pct = Math.round((score / total) * 100);

  let emoji = '😢';
  let msg = 'もう少し復習が必要です。';
  if (pct >= 90) { emoji = '🏆'; msg = '素晴らしい！完璧に近い正答率です！'; }
  else if (pct >= 70) { emoji = '🎉'; msg = 'よくできました！苦手な分野を重点的に復習しましょう。'; }
  else if (pct >= 50) { emoji = '💪'; msg = 'あと一歩！解説を読んで再チャレンジしてみましょう。'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultDenom').textContent = `/ ${total} 問`;
  document.getElementById('resultPct').textContent = `正答率 ${pct}%`;
  document.getElementById('resultMsg').textContent = msg;

  const list = document.getElementById('answerList');
  list.innerHTML = '<div style="font-weight:700;font-size:14px;margin-bottom:12px;color:#1e293b;">📋 解答一覧</div>';
  userAnswers.forEach((ua, i) => {
    const div = document.createElement('div');
    div.className = 'answer-item';
    div.innerHTML = `
      <div class="ans-q">Q${i+1}. ${ua.q.question}</div>
      <div class="ans-result">
        <span class="ans-badge ${ua.isCorrect ? 'ok' : 'ng'}">${ua.isCorrect ? '正解' : '不正解'}</span>
        <span style="color:#64748b">あなた: <strong>${ua.selected}</strong>　正解: <strong>${ua.q.answer}</strong></span>
      </div>
      ${!ua.isCorrect ? `<div style="margin-top:6px;font-size:12px;color:#78350f;background:#fffbeb;border-radius:6px;padding:6px 8px;">${ua.q.explanation}</div>` : ''}
    `;
    list.appendChild(div);
  });
}

// ===== 画面切替 =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('screenStart');
}

// ===== 初期化 =====
buildCatList();
</script>
